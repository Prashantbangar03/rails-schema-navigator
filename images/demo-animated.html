<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Schema Explorer Animated Demo</title>
<style>
  :root {
    --bg: #0a0e16; --panel: #0f1622; --line: #1c2740; --line-2: #243355;
    --ink: #e6e8ee; --ink-mute: #8a93a6; --ink-dim: #5b6478;
    --amber: #f5b54a; --amber-dim: #8a6520; --teal: #5eead4; --rose: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: var(--ink);
    width: 1280px; height: 800px; overflow: hidden; background: #06080f;
  }
  .frame {
    margin: 24px; height: calc(100% - 48px); border: 1px solid var(--line); border-radius: 8px;
    display: grid; grid-template-rows: 56px 32px 1fr; background: var(--bg);
  }
  .bar {
    display: grid; grid-template-columns: 200px 1fr 120px; gap: 14px; align-items: center;
    padding: 10px 18px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #0c111b, #0a0e16);
  }
  .brand .dot { color: var(--amber); }
  .brand small { display: block; color: var(--ink-dim); font-size: 10px; margin-top: 2px; }
  .search {
    background: var(--panel); border: 1px solid var(--line-2); border-radius: 3px;
    padding: 9px 12px; font: inherit; color: var(--ink); width: 100%;
  }
  .search-wrap { position: relative; }
  .caret {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    width: 2px; height: 16px; background: var(--amber); animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .stats { text-align: right; color: var(--ink-mute); font-size: 11px; }
  .stats b { color: var(--amber); }
  .trail { display: flex; gap: 8px; align-items: center; padding: 0 18px; border-bottom: 1px solid var(--line); background: var(--panel); font-size: 11px; }
  .content { display: grid; grid-template-columns: 280px 1fr; min-height: 0; }
  .sidebar { background: rgba(15,22,34,.5); border-right: 1px solid var(--line); }
  .sidehead { padding: 12px 16px 8px; font-size: 10px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: .15em; border-bottom: 1px solid var(--line); }
  .list li { padding: 6px 16px; border-left: 2px solid transparent; transition: all .35s ease; }
  .list li.match { background: rgba(94,234,212,.08); border-left-color: var(--teal); color: var(--teal); }
  .list li.active {
    background: linear-gradient(90deg, rgba(245,181,74,.12), transparent 60%);
    border-left-color: var(--amber); color: var(--amber);
  }
  .join { color: var(--rose); }
  .main { padding: 22px 32px; opacity: 0; transform: translateY(8px); transition: all .45s ease; }
  .main.show { opacity: 1; transform: translateY(0); }
  .main h1 .name { color: var(--amber); font-size: 22px; font-weight: 500; }
  .sec { margin-top: 18px; font-size: 12px; text-transform: uppercase; letter-spacing: .12em; font-weight: 600; }
  .pill { display: inline-block; margin-top: 10px; padding: 4px 10px; border: 1px solid var(--teal-dim, #2b6b62); color: var(--teal); border-radius: 3px; font-size: 11px; }
</style>
</head>
<body>
  <div class="frame">
    <header class="bar">
      <div class="brand">
        <div>schema<span class="dot">.</span>explorer</div>
        <small>db/structure.sql</small>
      </div>
      <div class="search-wrap">
        <input class="search" id="q" readonly value="⌕ " />
        <span class="caret" id="caret"></span>
      </div>
      <div class="stats"><b id="count">28</b> tables</div>
    </header>
    <div class="trail" id="trail"><span style="color:var(--ink-dim)">trail</span> <span id="trailText" style="color:var(--ink-dim);font-style:italic">no table selected</span></div>
    <div class="content">
      <aside class="sidebar">
        <div class="sidehead">tables</div>
        <ul class="list" id="list">
          <li data-t="apis">apis</li>
          <li data-t="apis_channels">apis_channels <span class="join">⇄</span></li>
          <li data-t="entities" id="row-entities">entities</li>
          <li data-t="channels">channels</li>
          <li data-t="fields">fields</li>
        </ul>
      </aside>
      <main class="main" id="detail">
        <h1><span class="name">entities</span></h1>
        <div class="sec"><span style="color:var(--amber);border:1px solid var(--amber-dim);padding:1px 7px">12</span> columns</div>
        <div class="pill">pg enum · entity_status · active · deprecated</div>
      </main>
    </div>
  </div>
  <script>
    const q = document.getElementById('q');
    const row = document.getElementById('row-entities');
    const detail = document.getElementById('detail');
    const trailText = document.getElementById('trailText');
    const caret = document.getElementById('caret');
    const text = 'entities';
    let i = 0;
    const typeMs = 180;
    const holdMs = 900;

    function typeNext() {
      if (i <= text.length) {
        q.value = '⌕ ' + text.slice(0, i);
        row.classList.toggle('match', i > 0 && i < text.length + 1);
        i++;
        setTimeout(typeNext, typeMs);
      } else {
        row.classList.remove('match');
        row.classList.add('active');
        trailText.textContent = 'entities';
        trailText.style.color = 'var(--amber)';
        trailText.style.fontStyle = 'normal';
        detail.classList.add('show');
        caret.style.display = 'none';
        setTimeout(() => { i = 0; reset(); }, holdMs * 2);
      }
    }
    function reset() {
      q.value = '⌕ ';
      row.classList.remove('active', 'match');
      detail.classList.remove('show');
      trailText.textContent = 'no table selected';
      trailText.style.color = 'var(--ink-dim)';
      trailText.style.fontStyle = 'italic';
      caret.style.display = 'block';
      setTimeout(typeNext, 400);
    }
    setTimeout(typeNext, 600);
  </script>
</body>
</html>
