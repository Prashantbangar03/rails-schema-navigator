<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rails Schema Explorer</title>
<style>
  :root {
    --bg:        #0a0e16;
    --bg-grid:   #111726;
    --panel:     #0f1622;
    --panel-2:   #131c2c;
    --line:      #1c2740;
    --line-2:    #243355;
    --ink:       #e6e8ee;
    --ink-mute:  #8a93a6;
    --ink-dim:   #5b6478;
    --amber:     #f5b54a;
    --amber-dim: #8a6520;
    --teal:      #5eead4;
    --teal-dim:  #2b6b62;
    --rose:      #f87171;
    --violet:    #a78bfa;
    --shadow:    0 1px 0 rgba(255,255,255,.03), 0 12px 28px -10px rgba(0,0,0,.7);
    --row-hover: rgba(255,255,255,.018);
    --bar-grad-top: #0c111b;
    --bar-grad-bot: #0a0e16;
    --panel-translucent: rgba(15,22,34,.5);
    --sidehead-bg:       rgba(10,14,22,.95);
  }
  [data-theme="light"] {
    --bg:        #faf6ec;
    --bg-grid:   #ebe2cc;
    --panel:     #ffffff;
    --panel-2:   #f6f0dd;
    --line:      #d8cea8;
    --line-2:    #b8a878;
    --ink:       #1a1f2e;
    --ink-mute:  #6b6f7c;
    --ink-dim:   #a8a698;
    --amber:     #a06600;
    --amber-dim: #d4a04a;
    --teal:      #167a66;
    --teal-dim:  #84c4b0;
    --rose:      #b73d3d;
    --violet:    #6b4ea3;
    --shadow:    0 1px 0 rgba(0,0,0,.02), 0 10px 24px -8px rgba(60,40,20,.15);
    --row-hover: rgba(0,0,0,.025);
    --bar-grad-top: #fffbe8;
    --bar-grad-bot: #faf6ec;
    --panel-translucent: rgba(255,255,255,.6);
    --sidehead-bg:       rgba(250,246,236,.95);
    --input-bg:          #ffffff;
    --input-bg-focus:    #ffffff;
  }

  :root,
  [data-theme="dark"] {
    color-scheme: dark;
    --input-bg:       var(--panel);
    --input-bg-focus: var(--panel-2);
  }
  [data-theme="light"] {
    color-scheme: light;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--vscode-editor-font-family, 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace);
    font-size: 13px; line-height: 1.5;
    color: var(--ink); background: var(--bg);
    background-image:
      radial-gradient(circle at 25% 8%, rgba(245,181,74,.04), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(94,234,212,.03), transparent 55%),
      radial-gradient(var(--bg-grid) 1px, transparent 1px);
    background-size: auto, auto, 22px 22px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .app { display: grid; grid-template-rows: auto auto 1fr; height: 100vh; }

  /* === breadcrumb trail === */
  .breadcrumb-bar {
    padding: 0 18px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    display: flex; align-items: center; gap: 8px;
    font-size: 11px;
    height: 32px;
    min-height: 32px;
    max-height: 32px;
    overflow: hidden;
    position: relative;
    z-index: 2;
  }
  .breadcrumb-bar .bc-label {
    color: var(--ink-dim);
    letter-spacing: .14em;
    text-transform: uppercase;
    font-size: 10px;
    margin-right: 4px;
    flex: 0 0 auto;
  }
  .breadcrumb {
    display: flex; align-items: center; gap: 4px;
    flex-wrap: nowrap;
    flex: 1;
    min-width: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
  }
  .bc-chip {
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 2px 10px;
    border-radius: 2px;
    color: var(--ink);
    cursor: pointer;
    font-size: 11px;
    transition: all .12s;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .bc-chip:hover { border-color: var(--amber); color: var(--amber); }
  .bc-chip.current {
    background: rgba(245,181,74,.08);
    border-color: var(--amber-dim);
    color: var(--amber);
    cursor: default;
    font-weight: 500;
  }
  .bc-sep { color: var(--ink-dim); margin: 0 2px; font-size: 10px; }
  .breadcrumb-empty { color: var(--ink-dim); font-style: italic; font-size: 11px; }

  header.bar {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px; align-items: center;
    padding: 10px 18px;
    min-height: 56px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--bar-grad-top) 0%, var(--bar-grad-bot) 100%);
    position: relative; z-index: 3;
  }
  .bar-search-group {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    flex: 1;
    width: 100%;
  }
  .bar-search-group.multi-project {
    display: grid;
    grid-template-columns: 3fr 7fr;
    align-items: center;
  }
  header.bar::after {
    content: ""; position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber-dim), transparent);
    opacity: .4;
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    font-weight: 500;
    letter-spacing: -0.01em;
    min-width: 0;
    max-width: 220px;
    flex-shrink: 0;
  }
  .brand .brand-title { display: flex; align-items: baseline; gap: 6px; white-space: nowrap; }
  .brand .b1 { color: var(--ink); }
  .brand .dot { color: var(--amber); font-weight: 700; }
  .brand .b2 { color: var(--ink-mute); }
  .brand small {
    color: var(--ink-dim); font-size: 10px;
    letter-spacing: .08em; text-transform: uppercase;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .brand #source-label {
    color: #ffffff;
  }
  .brand #source-label.copy-path {
    cursor: pointer;
  }
  .brand #source-label.copy-path:hover {
    text-decoration: underline dotted;
  }
  [data-theme="light"] .brand #source-label {
    color: var(--ink);
  }
  .brand small[hidden] { display: none; }

  .project-picker-wrap {
    min-width: 0;
    display: none;
  }
  .project-picker-wrap.show { display: block; }
  .project-picker {
    position: relative;
    width: 100%;
  }
  .project-search,
  .search-wrap input[type="search"],
  .compare-popover input {
    width: 100%;
    box-sizing: border-box;
    -webkit-appearance: none;
    appearance: none;
    background: var(--vscode-input-background, var(--input-bg));
    border: 1px solid var(--vscode-input-border, var(--line));
    border-radius: 2px;
    color: var(--vscode-input-foreground, var(--ink));
    font: inherit;
    outline: none;
    transition: border-color .15s, background .15s, box-shadow .15s;
  }
  .project-search {
    font-size: 13px;
    padding: 9px 12px;
    min-height: 38px;
  }
  .project-search:focus,
  .search-wrap input[type="search"]:focus,
  .compare-popover input:focus {
    border-color: var(--vscode-focusBorder, var(--amber));
    background: var(--vscode-input-background, var(--input-bg-focus));
    box-shadow: 0 0 0 1px var(--vscode-focusBorder, var(--amber));
  }
  .project-search::placeholder,
  .search-wrap input[type="search"]::placeholder,
  .compare-popover input::placeholder {
    color: var(--vscode-input-placeholderForeground, var(--ink-dim));
  }
  .project-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    max-height: 280px;
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--line-2);
    border-radius: 4px;
    box-shadow: 0 10px 28px rgba(0,0,0,.45);
    z-index: 60;
    display: none;
    flex-direction: column;
  }
  .project-list.show { display: flex; }
  .project-list-item {
    padding: 7px 12px;
    cursor: pointer;
    font-size: 12px;
    color: var(--ink);
    border-bottom: 1px solid var(--line);
  }
  .project-list-item:last-child { border-bottom: none; }
  .project-list-item:hover { background: rgba(245,181,74,.08); color: var(--amber); }
  .project-list-item.active { background: rgba(245,181,74,.12); color: var(--amber); }
  .project-list-item.highlighted {
    background: rgba(245,181,74,.15);
    color: var(--amber);
    box-shadow: inset 0 0 0 1px var(--amber-dim);
  }
  .project-list-item .project-kind {
    display: block;
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 2px;
    letter-spacing: .04em;
  }
  .project-list-empty {
    padding: 10px 12px;
    color: var(--ink-dim);
    font-size: 11px;
    font-style: italic;
  }

  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
    min-width: 0;
    width: 100%;
  }
  .bar-search-group:not(.multi-project) .search-wrap {
    flex: 1;
  }
  .search-wrap .slash {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--ink-dim); font-size: 13px; pointer-events: none;
  }
  .search-wrap input[type="search"] {
    font-size: 13px;
    padding: 9px 12px 9px 36px;
    min-height: 38px;
  }

  .kbd {
    display: inline-block; padding: 1px 6px;
    border: 1px solid var(--line-2); border-bottom-width: 2px;
    border-radius: 3px; color: var(--ink-mute);
    font-size: 10px; background: var(--bg); margin-left: 6px;
  }

  .bar-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .stats {
    display: flex; gap: 16px; color: var(--ink-mute);
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  }
  .stats b { color: var(--amber); font-weight: 500; }

  button.act {
    background: transparent; color: var(--ink);
    border: 1px solid var(--line-2); border-radius: 2px;
    padding: 7px 12px; font: inherit; font-size: 12px;
    cursor: pointer; transition: all .15s;
  }
  button.act:hover {
    border-color: var(--amber); color: var(--amber);
    background: rgba(245,181,74,.06);
  }
  button.act.primary { border-color: var(--amber-dim); color: var(--amber); }

  .content {
    display: grid;
    grid-template-columns: var(--sidebar-width, 320px) 6px minmax(0, 1fr);
    overflow: hidden;
  }
  .content.sidebar-collapsed {
    grid-template-columns: 0 6px minmax(0, 1fr);
  }

  aside.sidebar {
    border-right: none;
    background: var(--panel-translucent);
    overflow-y: auto; overflow-x: hidden;
    min-width: 0;
  }
  .sidebar-resizer {
    position: relative;
    cursor: col-resize;
    touch-action: none;
    background: transparent;
    z-index: 2;
  }
  .sidebar-resizer::before {
    content: "";
    position: absolute;
    left: 2px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--line);
  }
  .sidebar-resizer:hover::before,
  .sidebar-resizer.dragging::before {
    width: 2px;
    left: 1px;
    background: var(--amber-dim);
  }
  .sidebar-toggle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 18px;
    height: 36px;
    padding: 0;
    border: 1px solid var(--line-2);
    border-radius: 3px;
    background: var(--panel);
    color: var(--ink-mute);
    font: inherit;
    font-size: 10px;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    transition: opacity .15s, border-color .15s, color .15s;
    z-index: 3;
  }
  .sidebar-resizer:hover .sidebar-toggle,
  .content.sidebar-collapsed .sidebar-toggle {
    opacity: 1;
  }
  .sidebar-toggle:hover {
    border-color: var(--amber);
    color: var(--amber);
  }
  .content.sidebar-collapsed .sidebar-resizer {
    cursor: pointer;
  }
  .content.sidebar-collapsed aside.sidebar {
    overflow: hidden;
    visibility: hidden;
  }
  .sidehead {
    position: sticky; top: 0; z-index: 1;
    padding: 12px 16px 8px 16px;
    background: var(--sidehead-bg);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
    font-size: 10px; letter-spacing: .15em;
    text-transform: uppercase; color: var(--ink-dim);
    display: flex; justify-content: space-between; align-items: center;
  }
  .sidehead .count { color: var(--ink-mute); }

  ul.list { list-style: none; padding: 4px 0; margin: 0; }
  ul.list li {
    padding: 6px 16px; cursor: pointer;
    display: grid; grid-template-columns: 1fr auto;
    align-items: center; gap: 6px;
    border-left: 2px solid transparent;
    color: var(--ink);
    transition: background .1s, color .1s, border-color .1s;
  }
  ul.list li:hover { background: var(--panel); }
  ul.list li.active {
    background: linear-gradient(90deg, rgba(245,181,74,.08), transparent 60%);
    border-left-color: var(--amber); color: var(--amber);
  }
  ul.list li .tn { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  ul.list li .badges { display: flex; gap: 5px; font-size: 10px; color: var(--ink-dim); }
  ul.list li .badges .b {
    padding: 1px 5px; border: 1px solid var(--line);
    border-radius: 2px; min-width: 18px; text-align: center;
  }
  ul.list li.active .b { border-color: var(--amber-dim); }
  ul.list li .b.fkin { color: var(--teal); border-color: var(--teal-dim); }
  ul.list li mark { background: rgba(245,181,74,.2); color: var(--amber); padding: 0 1px; }

  .colmatch {
    padding: 4px 16px 8px 24px;
    background: rgba(94,234,212,.04);
    border-left: 2px solid var(--teal-dim);
    cursor: pointer; font-size: 11px; color: var(--ink-mute);
  }
  .colmatch:hover { background: rgba(94,234,212,.08); }
  .colmatch .cn { color: var(--teal); }
  .colmatch .arrow { margin: 0 6px; color: var(--ink-dim); }
  .colmatch mark { background: rgba(94,234,212,.2); color: var(--teal); padding: 0 1px; }

  main.panel { overflow-y: auto; padding: 0; position: relative; background: var(--bg); }
  .empty {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-mute);
    text-align: center;
    padding: 40px 24px;
  }
  .empty-inner { max-width: 520px; width: 100%; }
  .empty h2 { font-size: 18px; font-weight: 400; color: var(--ink); margin: 0 0 8px; }
  .empty p { margin: 6px 0; }
  .empty .hint {
    color: var(--ink-dim); font-size: 11px;
    letter-spacing: .1em; text-transform: uppercase; margin-top: 16px;
  }

  .table-view { padding: 22px 32px 80px 32px; max-width: 1500px; }
  .table-view header {
    display: flex; align-items: baseline; gap: 14px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px; margin-bottom: 22px;
  }
  .table-view h1 {
    font-size: 22px; font-weight: 500; margin: 0;
    color: var(--ink); letter-spacing: -0.01em;
  }
  .table-view h1 .schema { color: var(--ink-dim); }
  .table-view h1 .name { color: var(--amber); }
  .table-view header .pk {
    color: var(--ink-mute); font-size: 11px;
    letter-spacing: .08em; text-transform: uppercase;
  }
  .table-view header .pk b { color: var(--teal); font-weight: 500; text-transform: none; letter-spacing: 0; }
  .table-view header .right { margin-left: auto; display: flex; gap: 8px; }
  .table-view header .table-badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    border: 1px solid var(--line-2);
    color: var(--ink-mute);
    align-self: center;
  }
  .table-view header .table-badge.join {
    color: var(--rose);
    border-color: #7f3a3a;
    background: rgba(248,113,113,.08);
  }

  #tablelist .badges .b.join {
    color: var(--rose);
    border-color: #7f3a3a;
  }
  #tablelist .badges .b.idx {
    color: #8ab4f8;
    border-color: #2d4a78;
  }

  section.block { margin: 28px 0; }
  section.block > .sechead {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 600;
    margin-bottom: 14px;
  }
  section.block > .sechead.collapsible {
    cursor: pointer;
    user-select: none;
    border-radius: 3px;
    margin-left: -6px;
    margin-right: -6px;
    padding: 4px 6px;
    margin-bottom: 10px;
    transition: color .12s, background .12s;
  }
  section.block > .sechead.collapsible:hover {
    color: var(--amber);
    background: rgba(245,181,74,.06);
  }
  section.block > .sechead .sec-chevron {
    flex-shrink: 0;
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0;
    text-transform: none;
    margin-left: 4px;
  }
  section.block > .sechead.collapsible:hover .sec-chevron { color: var(--amber); }
  section.block.collapsed > .sechead { margin-bottom: 0; }
  section.block.collapsed > .secbody { display: none; }
  section.block.collapsed {
    border: 1px dashed var(--line-2);
    border-radius: 4px;
    padding: 4px 10px 10px;
    background: rgba(255, 255, 255, 0.02);
  }
  [data-theme="light"] section.block.collapsed {
    background: rgba(0, 0, 0, 0.02);
  }
  section.block > .sec-collapsed-hint {
    display: none;
    font-size: 11px;
    color: var(--ink-dim);
    font-style: italic;
    letter-spacing: .02em;
    text-transform: none;
    font-weight: 400;
    padding: 0 6px 4px;
    margin-top: -4px;
  }
  section.block.collapsed > .sec-collapsed-hint { display: block; }
  section.block > .sechead .sec-collapsed-badge {
    display: none;
    flex-shrink: 0;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-dim);
    border: 1px solid var(--line-2);
    border-radius: 2px;
    padding: 1px 6px;
    margin-left: 2px;
  }
  section.block.collapsed > .sechead .sec-collapsed-badge { display: inline-block; }
  section.block.collapsed > .sechead.collapsible {
    color: var(--ink-mute);
  }
  section.block > .sechead .num {
    color: var(--amber); border: 1px solid var(--amber-dim);
    padding: 1px 7px; min-width: 24px; text-align: center;
    font-weight: 700;
  }
  section.block > .sechead.teal .num { color: var(--teal); border-color: var(--teal-dim); }
  section.block > .sechead.violet .num { color: var(--violet); border-color: #5b4a92; }
  section.block > .sechead::after {
    content: ""; flex: 1; border-top: 1px dashed var(--line);
  }

  table.cols { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.cols th,
  table.cols td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    vertical-align: top;
  }
  table.cols thead th {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: .12em;
    text-transform: uppercase;
    font-weight: 500;
    border-bottom: 1px solid var(--line-2);
  }
  table.cols tbody tr:last-child td { border-bottom: none; }
  table.cols tr.highlighted td {
    background-color: rgba(245,181,74,.08);
    animation: flash 2s ease-out;
  }
  @keyframes flash {
    0%   { background-color: rgba(245,181,74,.28); }
    100% { background-color: rgba(245,181,74,.08); }
  }
  table.cols .fk-col-link {
    cursor: pointer;
    border-bottom: 1px dashed var(--amber-dim);
  }
  table.cols .fk-col-link:hover { color: var(--amber); }
  table.cols .col-name { color: var(--ink); white-space: nowrap; }
  table.cols .col-name.pk { color: var(--teal); font-weight: 500; }
  table.cols .col-name.fk { color: var(--amber); }
  table.cols .col-name .ind {
    display: inline-block; margin-right: 5px;
    width: 10px; color: var(--ink-dim); font-size: 10px;
  }
  table.cols .col-name.pk .ind { color: var(--teal); }
  table.cols .col-name.fk .ind { color: var(--amber); }
  table.cols .col-type { color: var(--violet); }
  table.cols .col-mods {
    color: var(--ink-mute);
    font-size: 11px;
  }
  /* flex on td breaks collapsed row borders — layout lives in the inner wrapper */
  table.cols .col-mods-inner {
    display: flex;
    flex-wrap: wrap;
    gap: 5px 8px;
    align-items: center;
    min-height: 1.25em;
  }
  table.cols .col-mods .mods-line { white-space: nowrap; }
  table.cols .col-mods .nn { color: var(--rose); }
  table.cols .col-mods .def { color: var(--ink-dim); }
  table.cols .col-mods .ix-chip {
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
    padding: 1px 7px;
    border: 1px solid #2d4a78;
    background: rgba(138,180,248,.06);
    color: #8ab4f8;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: .02em;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
    cursor: help;
  }
  table.cols .col-mods .ix-chip.unique {
    border-color: #5b4a92;
    background: rgba(167,139,250,.08);
    color: var(--violet);
  }
  table.cols .col-mods .ix-chip .ix-extra {
    color: var(--ink-dim);
    font-size: 9.5px;
  }
  table.cols .col-mods .ix-chip.unique .ix-extra {
    color: #6f5fa0;
  }
  table.cols .col-mods .uniq {
    color: var(--violet);
    border: 1px solid #5b4a92;
    background: rgba(167,139,250,.08);
    padding: 0 5px;
    border-radius: 2px;
    font-size: 9.5px;
    letter-spacing: .06em;
  }
  table.constraints-tbl .c-name code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink);
  }
  table.constraints-tbl .c-type {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .06em;
    border: 1px solid var(--line-2);
    color: var(--ink-mute);
  }
  table.constraints-tbl .c-type.unique {
    color: var(--violet);
    border-color: #5b4a92;
    background: rgba(167,139,250,.08);
  }
  table.constraints-tbl .c-type.uniqueindex {
    color: var(--violet);
    border-color: #5b4a92;
    background: rgba(167,139,250,.08);
  }
  table.constraints-tbl .c-type.index {
    color: #8ab4f8;
    border-color: #2d4a78;
    background: rgba(138,180,248,.06);
  }
  table.constraints-tbl .c-type.check {
    color: var(--amber);
    border-color: var(--amber-dim);
    background: rgba(245,181,74,.08);
  }
  table.constraints-tbl .c-type.exclude {
    color: var(--rose);
    border-color: #7f3a3a;
    background: rgba(248,113,113,.08);
  }
  table.constraints-tbl .c-cols {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--teal);
  }
  table.constraints-tbl .c-def {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mute);
    word-break: break-word;
  }

  .fk-list { display: flex; flex-direction: column; gap: 10px; }
  .row-wrap { display: flex; flex-direction: column; }
  .fk-row {
    display: grid;
    grid-template-columns: minmax(200px, 1fr) minmax(140px, auto) minmax(200px, 1fr) auto;
    gap: 8px;
    align-items: stretch;
    padding: 0;
    border: none;
    background: transparent;
  }

  /* relationship label (rails-style) above the connector */
  .conn-rails-label {
    font-size: 10px;
    font-style: italic;
    color: var(--ink-mute);
    text-align: center;
    white-space: nowrap;
    margin-bottom: 2px;
    letter-spacing: .02em;
  }
  .fk-row[data-dir="outgoing"] .conn-rails-label { color: var(--amber); }
  .fk-row[data-dir="incoming"] .conn-rails-label { color: var(--teal); }
  .fk-row.m2m-row .conn-rails-label { color: #f0a8c4; }

  /* expand button column */
  .row-actions {
    display: flex; align-items: center; justify-content: center;
    padding-left: 2px;
  }
  .expand-btn {
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--ink-mute);
    padding: 5px 10px;
    border-radius: 2px;
    font: inherit;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .12s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .expand-btn:hover {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(245,181,74,.05);
  }
  .expand-btn .chev {
    display: inline-block;
    font-size: 9px;
    transition: transform .15s;
  }
  .expand-btn.expanded {
    color: var(--teal);
    border-color: var(--teal-dim);
    background: rgba(94,234,212,.05);
  }
  .expand-btn.expanded .chev { transform: rotate(180deg); }

  /* nested expansion area */
  .row-expansion {
    margin: 6px 0 12px 24px;
    padding-left: 14px;
    border-left: 2px solid var(--teal-dim);
    display: flex; flex-direction: column; gap: 8px;
  }
  .expansion-header {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .expansion-header code {
    font-family: inherit;
    font-size: 11.5px;
    color: var(--teal);
    background: rgba(94,234,212,.08);
    border: 1px solid var(--teal-dim);
    padding: 1px 7px;
    border-radius: 2px;
    text-transform: none;
    letter-spacing: 0;
  }
  .expansion-subhead {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .expansion-subhead b { color: var(--amber); font-weight: 500; }
  .row-expansion .fk-list { gap: 6px; }
  .row-expansion .er-entity { padding: 6px 10px; font-size: 11.5px; }
  .row-expansion .er-entity .er-col { font-size: 11.5px; }
  .expansion-empty {
    color: var(--ink-dim);
    font-style: italic;
    font-size: 11.5px;
    padding: 4px 0;
  }
  .er-entity {
    display: flex;
    align-items: center;
    border: 1px solid var(--line-2);
    border-radius: 3px;
    background: var(--panel);
    padding: 8px 12px;
    min-width: 0;
    transition: all .12s;
    box-shadow: 0 1px 0 rgba(0,0,0,.15);
  }
  .er-entity.clickable { cursor: pointer; }
  .er-entity.clickable:hover {
    border-color: var(--amber);
    background: rgba(245,181,74,.04);
    transform: translateY(-1px);
    box-shadow: 0 3px 0 -1px rgba(245,181,74,.12);
  }
  .er-entity .er-col {
    font-size: 12px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
    width: 100%;
  }
  .er-entity .er-col .ind {
    width: 10px; color: var(--ink-dim); font-size: 10px;
  }
  .er-entity .er-col .colname {
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .er-entity .er-col .colname .tbl { color: var(--ink-mute); font-weight: 400; }
  .er-entity.clickable .er-col .colname .tbl { color: var(--ink-soft); }
  .er-entity .er-col .ctype {
    color: var(--violet);
    font-size: 10.5px;
    flex-shrink: 0;
    opacity: .9;
    white-space: nowrap;
  }
  .er-entity.has-pk .er-col .ind,
  .er-entity.has-pk .er-col .colname { color: var(--teal); }
  .er-entity.has-fk .er-col .ind,
  .er-entity.has-fk .er-col .colname { color: var(--amber); }

  .er-conn {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 6px;
    gap: 4px;
    position: relative;
  }
  .er-conn .conn-line-wrap {
    display: flex; align-items: center; width: 100%;
  }
  .er-conn .conn-line {
    flex: 1; height: 0;
    border-top: 1px solid var(--line-2);
  }
  .er-conn .conn-arrow {
    color: var(--line-2); font-size: 11px;
    margin-left: -1px; line-height: 1;
  }
  .er-conn .conn-meta {
    font-size: 9.5px;
    color: var(--ink-dim);
    text-align: center;
    letter-spacing: .06em;
    text-transform: uppercase;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .er-conn .conn-meta.inferred { color: var(--violet); }

  .fk-row.m2m-row .er-conn .conn-line { border-top-style: dashed; }
  .fk-row.m2m-row .er-conn .conn-arrow { color: #6e3a55; }
  .via-btn {
    background: rgba(217,122,163,.05);
    border: 1px solid #6e3a55;
    color: #f0a8c4;
    padding: 1px 7px;
    border-radius: 2px;
    font: inherit; font-size: 10.5px;
    cursor: pointer;
    transition: all .12s;
    letter-spacing: 0;
    text-transform: none;
  }
  .via-btn:hover { background: rgba(217,122,163,.15); border-color: #d97aa3; }

  /* === cardinality badges === */
  .card-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 1px 8px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .03em;
    border: 1px solid;
    border-radius: 2px;
    font-variant-numeric: tabular-nums;
    min-width: 36px;
    text-align: center;
    cursor: help;
  }
  .card-badge.card-n1 { color: var(--amber);  border-color: var(--amber-dim); background: rgba(245,181,74,.07); }
  .card-badge.card-1n { color: var(--teal);   border-color: var(--teal-dim);  background: rgba(94,234,212,.07); }
  .card-badge.card-11 { color: var(--violet); border-color: #5b4a92;          background: rgba(167,139,250,.07); }
  .card-badge.card-nm { color: #f0a8c4;       border-color: #6e3a55;          background: rgba(217,122,163,.07); }

  /* m2m section uses pink/rose accent in its sechead num */
  section.block > .sechead.m2m .num {
    color: #f0a8c4; border-color: #6e3a55;
  }
  section.block > .sechead.teal .num {
    color: var(--teal); border-color: var(--teal-dim);
  }
  .fk-row:hover {
    border-color: var(--line-2); background: var(--panel-2);
    transform: translateX(2px);
  }
  .fk-row .arrow { text-align: center; color: var(--ink-dim); font-size: 14px; line-height: 1; }
  .fk-row .from { color: var(--ink); }
  .fk-row .target { display: flex; align-items: center; gap: 6px; }
  .fk-row .target button {
    background: rgba(245,181,74,.07);
    border: 1px solid var(--amber-dim);
    color: var(--amber);
    padding: 3px 9px; border-radius: 2px;
    font: inherit; font-size: 12px;
    cursor: pointer; transition: all .12s;
  }
  .fk-row .target button:hover { background: rgba(245,181,74,.15); border-color: var(--amber); }
  .fk-row.incoming .target button {
    background: rgba(94,234,212,.07);
    border-color: var(--teal-dim); color: var(--teal);
  }
  .fk-row.incoming .target button:hover {
    background: rgba(94,234,212,.15); border-color: var(--teal);
  }
  .fk-row .target .pk-col { color: var(--ink-mute); font-size: 11px; }
  .fk-row .note {
    color: var(--ink-dim); font-size: 10px;
    letter-spacing: .1em; text-transform: uppercase;
    text-align: right;
  }
  .fk-row .note.inferred { color: var(--violet); }

  .empty-fk { color: var(--ink-dim); font-style: italic; padding: 8px 4px; font-size: 12px; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--line-2);
    border: 2px solid var(--bg);
    border-radius: 5px;
  }
  ::-webkit-scrollbar-thumb:hover { background: #2f4170; }
  ::selection { background: rgba(245,181,74,.3); color: #fff; }

  .toast {
    position: fixed; bottom: 18px; right: 18px;
    background: var(--panel-2);
    border: 1px solid var(--line-2);
    border-left: 2px solid var(--amber);
    padding: 8px 14px; font-size: 12px; color: var(--ink);
    border-radius: 2px; box-shadow: var(--shadow);
    z-index: 100; opacity: 0; transform: translateY(8px);
    transition: all .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .stale-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 8px 18px;
    background: rgba(245,181,74,.12);
    border-bottom: 1px solid var(--amber-dim);
    color: var(--amber);
    font-size: 11px;
  }
  .stale-banner[hidden] { display: none !important; }
  .stale-banner .stale-text { flex: 1; min-width: 200px; }
  .stale-banner .stale-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .stale-banner .stale-actions button {
    background: transparent;
    border: 1px solid var(--amber-dim);
    color: var(--amber);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    cursor: pointer;
  }
  .stale-banner .stale-actions button:hover {
    background: rgba(245,181,74,.15);
  }

  /* === compare === */
  .compare-wrap { position: relative; display: inline-block; }
  .compare-popover {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    width: 300px;
    max-height: 380px;
    background: var(--panel);
    border: 1px solid var(--line-2);
    border-radius: 4px;
    box-shadow: 0 12px 32px rgba(0,0,0,.5);
    z-index: 50;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .compare-popover.show { display: flex; }
  .compare-popover input {
    margin: 8px;
    width: calc(100% - 16px);
    padding: 7px 10px;
    font-size: 12px;
  }
  .compare-popover ul {
    list-style: none; margin: 0; padding: 0 0 6px;
    overflow-y: auto; flex: 1;
  }
  .compare-popover li {
    padding: 5px 14px;
    cursor: pointer;
    font-size: 12px;
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
  }
  .compare-popover li:hover { background: var(--bg); color: var(--amber); }
  .compare-popover li.disabled { color: var(--ink-dim); cursor: not-allowed; }
  .compare-popover li.disabled:hover { background: transparent; color: var(--ink-dim); }
  .compare-popover .no-results {
    padding: 14px; color: var(--ink-dim);
    font-style: italic; text-align: center; font-size: 11px;
  }

  .compare-view { padding: 22px 32px 80px; max-width: 1300px; }
  .compare-view > header {
    display: flex; align-items: baseline; gap: 14px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px; margin-bottom: 18px;
  }
  .compare-view h1 {
    font-size: 22px;
    font-weight: 500;
    margin: 0;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .compare-view h1 .name { color: var(--amber); }
  .compare-view h1 .vs { color: var(--ink-dim); margin: 0 8px; font-weight: 400; }
  .compare-view > header .right { margin-left: auto; display: flex; gap: 8px; }

  .compare-stats {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .cmp-stat {
    display: inline-flex; align-items: baseline; gap: 6px;
    padding: 6px 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: .04em;
  }
  .cmp-stat b { font-size: 18px; font-weight: 500; color: var(--ink); }
  .cmp-stat.same   { border-color: var(--teal-dim); }
  .cmp-stat.same b { color: var(--teal); }
  .cmp-stat.diff   { border-color: #5b4a92; }
  .cmp-stat.diff b { color: var(--violet); }
  .cmp-stat.only-a   { border-color: var(--amber-dim); }
  .cmp-stat.only-a b { color: var(--amber); }
  .cmp-stat.only-b   { border-color: #6e3a55; }
  .cmp-stat.only-b b { color: #f0a8c4; }

  table.compare-tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  table.compare-tbl th, table.compare-tbl td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    vertical-align: top;
    font-family: 'JetBrains Mono', monospace;
  }
  table.compare-tbl thead th {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: .12em;
    text-transform: uppercase;
    font-weight: 500;
    border-bottom-color: var(--line-2);
  }
  table.compare-tbl tbody tr:hover td { background: var(--row-hover); }
  table.compare-tbl .cmp-name { color: var(--ink); }
  table.compare-tbl .cmp-type { color: var(--violet); }
  table.compare-tbl .cmp-mods { color: var(--ink-mute); font-size: 10.5px; }
  table.compare-tbl .cmp-none { color: var(--ink-dim); font-style: italic; }
  table.compare-tbl .cmp-status {
    font-size: 10px;
    letter-spacing: .06em;
    padding: 1px 7px;
    border-radius: 2px;
    border: 1px solid;
    font-weight: 500;
    display: inline-block;
    min-width: 64px;
    text-align: center;
  }
  table.compare-tbl .cmp-status.same   { color: var(--teal);    border-color: var(--teal-dim);   background: rgba(94,234,212,.06); }
  table.compare-tbl .cmp-status.diff   { color: var(--violet);  border-color: #5b4a92;           background: rgba(167,139,250,.06); }
  table.compare-tbl .cmp-status.only-a { color: var(--amber);   border-color: var(--amber-dim);  background: rgba(245,181,74,.06); }
  table.compare-tbl .cmp-status.only-b { color: #f0a8c4;        border-color: #6e3a55;           background: rgba(217,122,163,.06); }
  table.compare-tbl tr.diff td { background: rgba(167,139,250,.04); }
  table.compare-tbl tr.only-a td { background: rgba(245,181,74,.03); }
  table.compare-tbl tr.only-b td { background: rgba(217,122,163,.03); }

  .enum-chip {
    display: inline-flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 4px 6px;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    margin-right: 4px;
    max-width: 100%;
  }
  .enum-chip.db {
    color: var(--teal);
    border: 1px solid var(--teal-dim);
    background: rgba(94,234,212,.06);
  }
  .enum-chip.model {
    color: var(--violet);
    border: 1px solid #5b4a92;
    background: rgba(167,139,250,.06);
  }
  .enum-chip-label { font-weight: 500; white-space: nowrap; }
  .enum-chip-values {
    display: inline-flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    white-space: normal;
  }
  .enum-sep { color: var(--ink-faint, var(--ink-dim)); font-weight: 400; }
  .enum-val { font-weight: 700; }
  .sidehead.secondary {
    margin-top: 10px;
    border-top: 1px solid var(--line);
    padding-top: 8px;
  }
  .list li.view-item .tn::before {
    font-size: 10px;
    color: var(--ink-dim);
    margin-right: 4px;
  }
  .list li.view-item .tn::before { content: 'view · '; }
  .sql-block {
    margin: 0;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 11px;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .enum-value-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .enum-value-list span {
    font-size: 11px;
    padding: 3px 8px;
    border: 1px solid var(--line-2);
    border-radius: 3px;
    background: var(--bg);
  }
</style>
</head>
<body>
  <div class="app">
    <header class="bar">
      <div class="brand">
        <div class="brand-title">
          <span class="b1">schema</span><span class="dot">.</span><span class="b2">explorer</span>
        </div>
        <small id="source-label">structure.sql</small>
      </div>
      <div id="bar-search-group" class="bar-search-group">
        <div id="project-picker-wrap" class="project-picker-wrap">
          <div class="project-picker" id="project-picker">
            <input id="project-search" class="project-search" type="search" placeholder="schema…" autocomplete="off" spellcheck="false" title="search projects (↑↓ navigate, Enter select)" />
            <div id="project-list" class="project-list"></div>
          </div>
        </div>
        <div class="search-wrap">
          <span class="slash">⌕</span>
          <input id="search" type="search" placeholder="search…  t: table · c: column · v: view" autocomplete="off" spellcheck="false" title="Prefixes: t: tables · c: columns · v: views" />
        </div>
      </div>
      <div class="bar-right">
        <div class="stats">
          <span><b id="stat-tables">0</b> tables</span>
        </div>
      </div>
    </header>
    <div id="stale-banner" class="stale-banner" hidden>
      <span class="stale-text"></span>
      <span class="stale-actions">
        <button type="button" data-stale-copy>Copy command</button>
        <button type="button" data-stale-open>Open schema</button>
        <button type="button" data-stale-run>Run in terminal</button>
        <button type="button" data-stale-refresh>Refresh</button>
      </span>
    </div>
    <div class="breadcrumb-bar">
      <span class="bc-label">trail</span>
      <div class="breadcrumb" id="breadcrumb"><span class="breadcrumb-empty">no table selected · pick one from the sidebar</span></div>
    </div>
    <div class="content" id="content-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidehead">
          <span>tables</span>
          <span class="count" id="filter-count"></span>
        </div>
        <ul class="list" id="tablelist"></ul>
        <div class="sidehead secondary" id="views-head" hidden>
          <span>views</span>
          <span class="count" id="view-filter-count"></span>
        </div>
        <ul class="list" id="viewlist" hidden></ul>
      </aside>
      <div class="sidebar-resizer" id="sidebar-resizer" title="Drag to resize · double-click to reset">
        <button type="button" class="sidebar-toggle" id="sidebar-toggle" title="Collapse sidebar" aria-label="Collapse sidebar">◀</button>
      </div>
      <main class="panel" id="main">
        <div class="empty">
          <div class="empty-inner">
            <h2>no schema loaded</h2>
            <p>Schema loads automatically from <code>db/structure.sql</code> or <code>db/schema.rb</code> in your workspace.</p>
            <p class="hint">search · <span class="kbd">t:</span> tables · <span class="kbd">c:</span> columns · <span class="kbd">/</span> focus · <span class="kbd">Enter</span> open</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(() => {
  'use strict';

  const state = {
    tables: new Map(),
    order: [],
    types: new Map(),
    typeOrder: [],
    views: new Map(),
    viewOrder: [],
    filtered: [],
    selected: null,
    selectionKind: 'table',
    highlightColumn: null,
    history: [],
    historyMax: 8,
    compareWith: null,
    activeProjectId: null,
    sourcePath: '',
  };

  let _projectCatalog = [];
  let _projectFollowEditor = true;
  let _projectPickerOpen = false;
  let _projectSelectBusy = false;
  let _projectListItems = [];
  let _projectHighlightIndex = -1;

  const LS_SIDEBAR_WIDTH = 'schemaExplorer.sidebarWidth';
  const LS_SIDEBAR_COLLAPSED = 'schemaExplorer.sidebarCollapsed';
  const LS_SECTIONS = 'schemaExplorer.sections';
  const DEFAULT_SIDEBAR_WIDTH = 320;
  const SIDEBAR_MIN = 200;
  const SIDEBAR_MAX_RATIO = 0.45;

  const SECTION_DEFAULTS = {
    columns: true,
    constraints: true,
    incoming: true,
    m2m: true,
    outgoing: true,
    'view-definition': true,
    'compare-columns': true,
  };

  function sectionStorageKey(ownerKey, sectionId) {
    return `${ownerKey}::${sectionId}`;
  }

  function collapsedHintText(sectionId, count) {
    const labels = {
      columns: `${count} column${count === 1 ? '' : 's'} hidden`,
      constraints: `${count} constraint${count === 1 ? '' : 's'} hidden`,
      incoming: `${count} incoming reference${count === 1 ? '' : 's'} hidden`,
      m2m: `${count} m2m link${count === 1 ? '' : 's'} hidden`,
      outgoing: `${count} outgoing reference${count === 1 ? '' : 's'} hidden`,
      'view-definition': 'view definition hidden',
      'compare-columns': `${count} comparison row${count === 1 ? '' : 's'} hidden`,
    };
    const base = labels[sectionId] || 'content hidden';
    return `${base} · click header to expand`;
  }

  function getSectionOpen(ownerKey, sectionId) {
    const key = sectionStorageKey(ownerKey, sectionId);
    try {
      const saved = JSON.parse(localStorage.getItem(LS_SECTIONS) || '{}');
      if (Object.prototype.hasOwnProperty.call(saved, key)) return !!saved[key];
    } catch {}
    return SECTION_DEFAULTS[sectionId] !== false;
  }

  function setSectionOpen(ownerKey, sectionId, open) {
    const key = sectionStorageKey(ownerKey, sectionId);
    try {
      const saved = JSON.parse(localStorage.getItem(LS_SECTIONS) || '{}');
      saved[key] = !!open;
      localStorage.setItem(LS_SECTIONS, JSON.stringify(saved));
    } catch {}
  }

  function renderCollapsibleSection(ownerKey, sectionId, extraClass, innerHtml, bodyHtml, hintCount) {
    const open = getSectionOpen(ownerKey, sectionId);
    const collapsedCls = open ? '' : ' collapsed';
    const extra = extraClass ? ` ${extraClass}` : '';
    const hint = collapsedHintText(sectionId, hintCount ?? 0);
    return `
      <section class="block${collapsedCls}" data-section-owner="${esc(ownerKey)}" data-section="${esc(sectionId)}">
        <div class="sechead collapsible${extra}" role="button" tabindex="0" aria-expanded="${open ? 'true' : 'false'}">
          ${innerHtml}
          <span class="sec-collapsed-badge">collapsed</span>
          <span class="sec-chevron" aria-hidden="true">${open ? '▾' : '▸'}</span>
        </div>
        <div class="sec-collapsed-hint">${esc(hint)}</div>
        <div class="secbody">${bodyHtml}</div>
      </section>`;
  }

  function toggleSectionBlock(block, open) {
    if (!block) return;
    const head = block.querySelector('.sechead.collapsible');
    const chevron = head?.querySelector('.sec-chevron');
    block.classList.toggle('collapsed', !open);
    if (head) head.setAttribute('aria-expanded', open ? 'true' : 'false');
    if (chevron) chevron.textContent = open ? '▾' : '▸';
    const owner = block.dataset.sectionOwner;
    const id = block.dataset.section;
    if (owner && id) setSectionOpen(owner, id, open);
  }

  const $  = sel => document.querySelector(sel);
  const $$ = sel => Array.from(document.querySelectorAll(sel));

  // Safe HTML mount: clears the element and inserts pre-escaped markup.
  // All dynamic values used in the markup pass through esc() at the call site.
  function mount(el, markup) {
    el.replaceChildren();
    el.insertAdjacentHTML('beforeend', markup);
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
  }

  function highlight(text, q) {
    if (!q) return esc(text);
    const lower = text.toLowerCase();
    const i = lower.indexOf(q);
    if (i < 0) return esc(text);
    return `${esc(text.slice(0, i))}<mark>${esc(text.slice(i, i + q.length))}</mark>${esc(text.slice(i + q.length))}`;
  }

  // ============ rendering ============
  function renderStats() {
    $('#stat-tables').textContent = state.tables.size;
  }

  function formatEnumValues(values, source) {
    return (values || []).map(v => {
      if (source === 'model' && v.value !== v.label) return `${v.label} (${v.value})`;
      return v.label;
    });
  }

  function simplifyColumnType(rawType) {
    const t = String(rawType || '').replace(/^public\./, '').trim();
    if (!t) return '—';
    const enumType = state.types.get(t);
    if (enumType?.kind === 'enum') return 'enum';
    if (/^character varying|^varchar/i.test(t)) return 'string';
    if (/^character(\(\d+\))?$/i.test(t)) return 'string';
    if (/^text$/i.test(t)) return 'string';
    if (/^bigint$/i.test(t)) return 'integer';
    if (/^smallint$/i.test(t)) return 'integer';
    if (/^integer$/i.test(t)) return 'integer';
    if (/^timestamp/i.test(t)) return t.split(/\s+/)[0];
    return t;
  }

  function renderColumnTypeCell(col, table) {
    const enumInfo = table.columnEnums?.[col.name];
    if (enumInfo?.source === 'database') {
      return esc('enum');
    }
    if (enumInfo?.source === 'model') {
      const base = simplifyColumnType(col.type);
      if (base === 'enum') return esc('integer');
      if (/^(integer|string)$/i.test(base)) return esc(base);
      if (/^int/i.test(base)) return esc('integer');
      return esc(base);
    }
    return esc(simplifyColumnType(col.type));
  }

  function renderColumnEnumChip(columnName, table) {
    const e = table.columnEnums?.[columnName];
    if (!e) return '';
    const klass = e.source === 'model' ? 'enum-chip model' : 'enum-chip db';
    const src = e.source === 'model' ? 'rails enum' : 'pg enum';
    const valueParts = formatEnumValues(e.values, e.source);
    const valuesHtml = valueParts.length
      ? `<span class="enum-chip-values"><span class="enum-sep">·</span>${valueParts.map(v => `<strong class="enum-val">${esc(v)}</strong>`).join('<span class="enum-sep"> · </span>')}</span>`
      : '';
    const tip = e.modelName
      ? `${src} · ${e.name} · ${valueParts.join(', ')} (${e.modelName})`
      : `${src} · ${e.name} · ${valueParts.join(', ')}`;
    return `<span class="${klass}" title="${esc(tip)}"><span class="enum-chip-label">${esc(src)} · ${esc(e.name)}</span>${valuesHtml}</span>`;
  }

  const SEARCH_PREFIXES = [
    ['attribute:', 'column'],
    ['table:', 'table'],
    ['column:', 'column'],
    ['view:', 'view'],
    ['tab:', 'table'],
    ['attr:', 'column'],
    ['col:', 'column'],
    ['t:', 'table'],
    ['c:', 'column'],
    ['v:', 'view'],
  ].sort((a, b) => b[0].length - a[0].length);

  function parseSearchQuery(raw) {
    const trimmed = raw.trim();
    const lower = trimmed.toLowerCase();
    for (const [prefix, mode] of SEARCH_PREFIXES) {
      if (lower.startsWith(prefix)) {
        return { mode, query: trimmed.slice(prefix.length).trim().toLowerCase() };
      }
    }
    return { mode: 'all', query: lower };
  }

  function searchFilterCountLabel(mode, query, resultCount) {
    const total = state.tables.size;
    if (mode === 'all' && !query) return `${total}`;
    const tags = { table: 'tab', column: 'col', view: 'view' };
    const tag = tags[mode];
    const suffix = tag ? (query ? `${tag}:${query}` : tag) : query;
    return suffix ? `${resultCount}/${total} · ${suffix}` : `${resultCount}/${total}`;
  }

  function renderTableList() {
    const raw = $('#search').value;
    const { mode, query: q } = parseSearchQuery(raw);
    const ul = $('#tablelist');

    let results;
    if (mode === 'all' && !q) {
      results = state.order.map(name => ({ table: state.tables.get(name), matches: [], tableMatched: true }));
    } else if (mode === 'column' && !q) {
      results = [];
    } else {
      results = [];
      for (const name of state.order) {
        const t = state.tables.get(name);
        const tableMatched = !q || name.toLowerCase().includes(q);
        let colMatches = [];

        if (mode === 'all') {
          colMatches = q ? t.columns.filter(c => c.name.toLowerCase().includes(q)) : [];
        } else if (mode === 'column') {
          colMatches = t.columns.filter(c => c.name.toLowerCase().includes(q));
        }

        let include = false;
        if (mode === 'table') {
          include = !q || tableMatched;
        } else if (mode === 'column') {
          include = colMatches.length > 0;
        } else {
          include = tableMatched || colMatches.length > 0;
        }

        if (include) {
          results.push({
            table: t,
            matches: mode === 'table' ? [] : colMatches,
            tableMatched: mode !== 'column' && tableMatched,
          });
        }
      }
    }

    state.filtered = results;
    $('#filter-count').textContent = searchFilterCountLabel(mode, q, results.length);

    if (mode === 'view') {
      mount(ul, `<li style="color:var(--ink-dim); font-style:italic; cursor:default;">showing views below · tables hidden while prefixed</li>`);
      renderViewList(mode, q);
      return;
    }

    if (mode === 'column' && !q) {
      mount(ul, `<li style="color:var(--ink-dim); font-style:italic; cursor:default;">type after <code>col:</code> to filter columns</li>`);
      renderViewList(mode, q);
      return;
    }

    if (results.length === 0) {
      mount(ul, `<li style="color:var(--ink-dim); font-style:italic; cursor:default;">no matches</li>`);
      renderViewList(mode, q);
      return;
    }

    const rows = results.map(r => {
      const activeCls = state.selectionKind === 'table' && state.selected === r.table.name ? 'active' : '';
      const badgesHtml = r.table.isJoinTable
        ? '<span class="badges"><span class="b join" title="join table">⇄</span></span>'
        : '';
      const tableLi = `<li class="${activeCls}" data-table="${esc(r.table.name)}">
        <span class="tn">${highlight(r.table.name, q)}</span>
        ${badgesHtml}
      </li>`;
      const colHits = r.matches.map(c =>
        `<div class="colmatch" data-table="${esc(r.table.name)}" data-col="${esc(c.name)}">
           <span class="cn">${highlight(c.name, q)}</span>
           <span class="arrow">in</span>${esc(r.table.name)}
         </div>`
      ).join('');
      return tableLi + colHits;
    }).join('');

    mount(ul, rows);

    ul.querySelectorAll('li[data-table]').forEach(li => {
      li.addEventListener('click', () => selectTable(li.dataset.table));
    });
    ul.querySelectorAll('.colmatch').forEach(div => {
      div.addEventListener('click', () => selectTable(div.dataset.table, div.dataset.col));
    });
    renderViewList(mode, q);
  }

  function renderViewList(mode, q) {
    const head = $('#views-head');
    const ul = $('#viewlist');
    const countEl = $('#view-filter-count');
    if (!head || !ul) return;

    if (state.viewOrder.length === 0) {
      head.hidden = true;
      ul.hidden = true;
      return;
    }

    head.hidden = false;
    ul.hidden = false;

    let names = state.viewOrder;
    if (q && (mode === 'all' || mode === 'view')) {
      names = names.filter(n => n.toLowerCase().includes(q));
    }

    if (countEl) countEl.textContent = String(names.length);

    if (names.length === 0) {
      mount(ul, `<li style="color:var(--ink-dim); font-style:italic; cursor:default;">no view matches</li>`);
      return;
    }

    mount(ul, names.map(name => {
      const v = state.views.get(name);
      const activeCls = state.selectionKind === 'view' && state.selected === name ? 'active' : '';
      const mat = v?.materialized ? '<span class="b" title="materialized view">mat</span>' : '';
      return `<li class="view-item ${activeCls}" data-view="${esc(name)}">
        <span class="tn">${highlight(name, q)}</span>
        <span class="badges">${mat}</span>
      </li>`;
    }).join(''));

    ul.querySelectorAll('li[data-view]').forEach(li => {
      li.addEventListener('click', () => selectView(li.dataset.view));
    });
  }

  function selectView(name) {
    if (!state.views.has(name)) {
      toast(`unknown view: ${name}`);
      return;
    }
    state.selectionKind = 'view';
    state.selected = name;
    state.compareWith = null;
    state.highlightColumn = null;
    renderTableList();
    renderBreadcrumb();
    renderMain();
  }

  function pushHistory(name) {
    state.history = state.history.filter(n => n !== name);
    state.history.push(name);
    if (state.history.length > state.historyMax) state.history.shift();
  }

  function renderBreadcrumb() {
    const bc = document.querySelector('#breadcrumb');
    if (!bc) return;
    if (state.selectionKind === 'view' && state.selected) {
      mount(bc, `<span class="bc-chip current">view · ${esc(state.selected)}</span>`);
      return;
    }
    const trail = state.history.filter(n => state.tables.has(n));
    state.history = trail;
    if (!trail.length) {
      mount(bc, `<span class="breadcrumb-empty">no table selected · pick one from the sidebar</span>`);
      return;
    }
    const chips = trail.map((n, i) => {
      const isCurrent = n === state.selected;
      const sep = i > 0 ? `<span class="bc-sep">›</span>` : '';
      return sep + `<span class="bc-chip ${isCurrent ? 'current' : ''}" data-bc="${esc(n)}">${esc(n)}</span>`;
    }).join('');
    mount(bc, chips);
    bc.querySelectorAll('.bc-chip').forEach(el => {
      if (el.classList.contains('current')) return;
      el.addEventListener('click', () => selectTable(el.dataset.bc));
    });
  }

  function selectTable(name, highlightCol, options = {}) {
    if (!state.tables.has(name)) {
      toast(`unknown table: ${name}`);
      return;
    }
    // In compare mode, sidebar/breadcrumb clicks set the SECOND table (right side).
    if (state.compareWith && state.compareWith !== name && name !== state.selected) {
      state.compareWith = name;
      renderTableList();
      renderBreadcrumb();
      renderMain();
      return;
    }
    if (state.selected !== name) {
      if (options.skipHistorySeed) {
        state.history = [name];
      } else {
        pushHistory(name);
      }
    }
    state.selected = name;
    state.selectionKind = 'table';
    state.highlightColumn = highlightCol || null;
    if (history.state?.table !== name) {
      history.pushState({ table: name }, '', `#${name}`);
    }
    renderTableList();
    renderBreadcrumb();
    renderMain();
  }

  // ============ compare ============
  function buildComparison(tA, tB) {
    const aMap = new Map(tA.columns.map(c => [c.name, c]));
    const bMap = new Map(tB.columns.map(c => [c.name, c]));
    const allNames = new Set([...aMap.keys(), ...bMap.keys()]);
    const columns = [];
    for (const name of allNames) {
      const a = aMap.get(name);
      const b = bMap.get(name);
      let status = 'same';
      if (!a) status = 'only-b';
      else if (!b) status = 'only-a';
      else if (a.type !== b.type || a.notNull !== b.notNull) status = 'diff';
      columns.push({ name, a, b, status });
    }
    const order = { 'diff': 0, 'same': 1, 'only-a': 2, 'only-b': 3 };
    columns.sort((x, y) => (order[x.status] - order[y.status]) || x.name.localeCompare(y.name));
    const stats = {
      same:   columns.filter(c => c.status === 'same').length,
      diff:   columns.filter(c => c.status === 'diff').length,
      onlyA:  columns.filter(c => c.status === 'only-a').length,
      onlyB:  columns.filter(c => c.status === 'only-b').length,
    };
    return { columns, stats };
  }

  function renderColCell(col) {
    if (!col) return `<span class="cmp-none">—</span>`;
    const mods = [];
    if (col.notNull) mods.push('NOT NULL');
    if (col.default) mods.push(`default ${col.default}`);
    return `<span class="cmp-type">${esc(col.type)}</span>${mods.length ? ` <span class="cmp-mods">· ${esc(mods.join(' · '))}</span>` : ''}`;
  }

  function compareSectionOwner(tA, tB) {
    const names = [tA.name, tB.name].sort();
    return `compare:${names[0]}:${names[1]}`;
  }

  function renderCompare(tA, tB) {
    const cmp = buildComparison(tA, tB);
    const sectionOwner = compareSectionOwner(tA, tB);
    const colRows = cmp.columns.map(c => `<tr class="${c.status}">
      <td class="cmp-name">${esc(c.name)}</td>
      <td>${renderColCell(c.a)}</td>
      <td>${renderColCell(c.b)}</td>
      <td><span class="cmp-status ${c.status}">${c.status === 'same' ? '= same' : c.status === 'diff' ? '≠ diff' : c.status === 'only-a' ? '◀ A' : 'B ▶'}</span></td>
    </tr>`).join('');

    return `<div class="compare-view">
      <header>
        <h1>
          <span class="name">${esc(tA.name)}</span>
          <span class="vs">⟷</span>
          <span class="name">${esc(tB.name)}</span>
        </h1>
        <div class="right">
          <button class="act" data-cmp-swap>swap ⇄</button>
          <button class="act" data-cmp-exit>exit ✕</button>
        </div>
      </header>

      <div class="compare-stats">
        <span class="cmp-stat same"><b>${cmp.stats.same}</b> shared</span>
        <span class="cmp-stat diff"><b>${cmp.stats.diff}</b> differ</span>
        <span class="cmp-stat only-a"><b>${cmp.stats.onlyA}</b> only in ${esc(tA.name)}</span>
        <span class="cmp-stat only-b"><b>${cmp.stats.onlyB}</b> only in ${esc(tB.name)}</span>
      </div>

      ${renderCollapsibleSection(
        sectionOwner,
        'compare-columns',
        '',
        `<span class="num">${cmp.columns.length}</span> column comparison`,
        `<table class="compare-tbl">
          <thead><tr>
            <th style="width:22%">column</th>
            <th style="width:32%">${esc(tA.name)}</th>
            <th style="width:32%">${esc(tB.name)}</th>
            <th style="width:14%">status</th>
          </tr></thead>
          <tbody>${colRows}</tbody>
        </table>`,
        cmp.columns.length,
      )}
    </div>`;
  }

  function swapCompare() {
    const a = state.selected;
    const b = state.compareWith;
    state.selected = b;
    state.compareWith = a;
    renderTableList();
    renderBreadcrumb();
    renderMain();
  }

  function exitCompare() {
    state.compareWith = null;
    renderTableList();
    renderMain();
  }

  function renderComparePopoverList(filter) {
    const list = document.querySelector('[data-cmp-list]');
    if (!list) return;
    const q = (filter || '').trim().toLowerCase();
    const items = state.order
      .filter(n => n !== state.selected)
      .filter(n => !q || n.toLowerCase().includes(q));
    if (!items.length) {
      mount(list, `<div class="no-results">no matching tables</div>`);
      return;
    }
    mount(list, items.map(n => `<li data-cmp-pick="${esc(n)}">${esc(n)}</li>`).join(''));
    list.querySelectorAll('li[data-cmp-pick]').forEach(li => {
      li.addEventListener('click', () => {
        const name = li.dataset.cmpPick;
        state.compareWith = name;
        document.querySelector('#comparePopover')?.classList.remove('show');
        renderTableList();
        renderMain();
      });
    });
  }

  function openComparePopover() {
    const pop = document.querySelector('#comparePopover');
    if (!pop) return;
    pop.classList.add('show');
    renderComparePopoverList('');
    const input = pop.querySelector('input');
    if (input) { input.value = ''; setTimeout(() => input.focus(), 0); }
  }

  function compositeUniqueSets(t) {
    return (t.uniqueColumnSets || []).filter(set => Array.isArray(set) && set.length > 1);
  }

  function columnSetKey(columns) {
    return (columns || []).join('\0');
  }

  function collectTableRules(t) {
    const rows = [];
    const seen = new Set();

    function add(name, type, columns, definition) {
      const key = `${type}\0${columnSetKey(columns)}\0${name || ''}\0${definition || ''}`;
      if (seen.has(key)) return;
      seen.add(key);
      rows.push({
        name: name || '—',
        type,
        columns: columns || [],
        definition: definition || '',
      });
    }

    function hasUniqueOnColumns(cols) {
      const key = columnSetKey(cols);
      return rows.some(r =>
        (r.type === 'UNIQUE INDEX' || r.type === 'UNIQUE') && columnSetKey(r.columns) === key
      );
    }

    for (const ix of t.indexes || []) {
      if (!ix.columnNames || ix.columnNames.length === 0) continue;
      if (ix.columnNames.length <= 1 && !ix.predicate) continue;
      const type = ix.unique ? 'UNIQUE INDEX' : 'INDEX';
      const method = ix.method && ix.method !== 'btree' && ix.method !== 'constraint' ? ix.method : '';
      const whereSuffix = ix.predicate ? ` WHERE ${ix.predicate}` : '';
      const def = method
        ? `${method} (${ix.columnNames.join(', ')})${whereSuffix}`
        : `(${ix.columnNames.join(', ')})${whereSuffix}`;
      add(ix.name, type, ix.columnNames, def);
    }

    for (const c of t.constraints || []) {
      if (c.type === 'UNIQUE' && c.columns && c.columns.length === 1) continue;
      const cols = c.columns || [];
      if (c.type === 'UNIQUE' && hasUniqueOnColumns(cols)) continue;
      add(c.name, c.type, cols, c.definition || '');
    }

    for (const set of compositeUniqueSets(t)) {
      if (hasUniqueOnColumns(set)) continue;
      add('', 'UNIQUE', set, `(${set.join(', ')})`);
    }

    const typeOrder = { CHECK: 0, EXCLUDE: 1, UNIQUE: 2, 'UNIQUE INDEX': 3, INDEX: 4 };
    rows.sort((a, b) => {
      const ta = typeOrder[a.type] ?? 99;
      const tb = typeOrder[b.type] ?? 99;
      if (ta !== tb) return ta - tb;
      return a.name.localeCompare(b.name);
    });

    return rows;
  }

  function renderTableRulesSection(t, sectionOwner) {
    const rules = collectTableRules(t);
    if (!rules.length) return '';
    return renderCollapsibleSection(
      sectionOwner,
      'constraints',
      'violet',
      `<span class="num">${rules.length}</span> table constraints · indexes, unique, check, exclude`,
      renderConstraintsTable(rules),
      rules.length,
    );
  }

  function renderViewMain() {
    const main = $('#main');
    const v = state.views.get(state.selected);
    if (!main || !v) return;
    const schemaName = v.schema || 'public';
    const kindBadge = v.materialized
      ? '<span class="table-badge join" title="Materialized view">materialized view</span>'
      : '<span class="pk">view</span>';
    mount(main, `
      <div class="table-view">
        <header>
          <h1><span class="schema">${esc(schemaName)}.</span><span class="name">${esc(v.name)}</span></h1>
          ${kindBadge}
        </header>
        ${renderCollapsibleSection(
          `view:${v.name}`,
          'view-definition',
          '',
          '<span class="num">1</span> definition · from database schema',
          `<pre class="sql-block">${esc(v.definition)}</pre>`,
          1,
        )}
      </div>
    `);
  }

  function renderMain() {
    const main = $('#main');
    if (!state.selected) return;
    if (state.selectionKind === 'view') {
      renderViewMain();
      return;
    }
    if (!state.tables.has(state.selected)) return;
    const t = state.tables.get(state.selected);
    if (!t) return;

    // Compare-mode shortcut: render side-by-side comparison instead of the article.
    if (state.compareWith && state.compareWith !== state.selected) {
      const tB = state.tables.get(state.compareWith);
      if (tB) {
        mount(main, renderCompare(t, tB));
        main.querySelector('[data-cmp-swap]')?.addEventListener('click', swapCompare);
        main.querySelector('[data-cmp-exit]')?.addEventListener('click', exitCompare);
        return;
      }
    }

    const pkText = t.primaryKey ? t.primaryKey.join(', ') : '—';
    const pkCols = new Set(t.primaryKey || []);

    const colRows = t.columns.map(c => {
      const isPk = pkCols.has(c.name);
      const cls = isPk ? 'pk' : (c.isFk ? 'fk' : '');
      const ind = isPk ? '★' : (c.isFk ? '↗' : '·');
      const mods = [];
      if (c.notNull) mods.push('<span class="nn">NOT NULL</span>');
      if (c.default) mods.push(`<span class="def">DEFAULT ${esc(c.default)}</span>`);
      if (t.uniqueColumns && t.uniqueColumns.has(c.name)) mods.push('<span class="uniq" title="single-column unique constraint or unique index">UNIQUE</span>');
      const hl = c.name === state.highlightColumn ? 'highlighted' : '';

      const chips = (t.indexes || [])
        .filter(ix => ix.columnNames && ix.columnNames.length === 1 && ix.columnNames.includes(c.name))
        .map(ix => {
          const extras = [];
          if (ix.method && ix.method !== 'btree' && ix.method !== 'constraint') extras.push(ix.method);
          const extra = extras.length ? `<span class="ix-extra">${esc(extras.join(' · '))}</span>` : '';
          const klass = ix.unique ? 'ix-chip unique' : 'ix-chip';
          const tip = `${ix.unique ? 'UNIQUE ' : ''}${ix.method}(${ix.columnNames.join(', ')})`;
          return `<span class="${klass}" title="${esc(tip)}">${esc(ix.name)}${extra}</span>`;
        }).join('');
      const enumChips = renderColumnEnumChip(c.name, t);
      const fk = t.outgoingFks.find(f => f.fromCol === c.name);
      const modsLine = mods.length ? `<span class="mods-line">${mods.join(' · ')}</span>` : '';
      const colNameInner = (c.isFk && fk)
        ? `<span class="ind">${ind}</span><span class="fk-col-link" data-target="${esc(fk.toTable)}" data-target-col="${esc(fk.toCol)}" title="go to ${esc(fk.toTable)}">${esc(c.name)}</span>`
        : `<span class="ind">${ind}</span>${esc(c.name)}`;

      return `<tr class="${hl}" data-col="${esc(c.name)}">
        <td class="col-name ${cls}">${colNameInner}</td>
        <td class="col-type">${renderColumnTypeCell(c, t)}</td>
        <td class="col-mods"><div class="col-mods-inner">${modsLine}${enumChips}${chips}</div></td>
      </tr>`;
    }).join('');

    const pkColForLabel = t.primaryKey && t.primaryKey.length === 1 ? t.primaryKey[0] : (t.primaryKey?.join(',') || 'id');
    const sectionOwner = `table:${t.name}`;

    const columnsHtml = t.columns.length ? renderCollapsibleSection(
      sectionOwner,
      'columns',
      '',
      `<span class="num">${t.columns.length}</span> columns`,
      `<table class="cols">
          <thead><tr><th style="width:18%">name</th><th style="width:11%">type</th><th>modifiers</th></tr></thead>
          <tbody>${colRows}</tbody>
        </table>`,
      t.columns.length,
    ) : '';

    const tableRulesHtml = renderTableRulesSection(t, sectionOwner);

    const incomingHtml = t.incomingFks.length ? renderCollapsibleSection(
      sectionOwner,
      'incoming',
      'teal',
      `<span class="num">${t.incomingFks.length}</span> used as foreign key in · tables that reference <code>${esc(t.name)}.${esc(pkColForLabel)}</code>`,
      renderFkList(t.incomingFks, 'incoming'),
      t.incomingFks.length,
    ) : '';

    const m2mHtml = (t.manyToMany && t.manyToMany.length) ? renderCollapsibleSection(
      sectionOwner,
      'm2m',
      'm2m',
      `<span class="num">${t.manyToMany.length}</span> many-to-many · connected via join tables`,
      renderM2MRows(t),
      t.manyToMany.length,
    ) : '';

    const outgoingHtml = t.outgoingFks.length ? renderCollapsibleSection(
      sectionOwner,
      'outgoing',
      '',
      `<span class="num">${t.outgoingFks.length}</span> outgoing references · this table refers to`,
      renderFkList(t.outgoingFks, 'outgoing'),
      t.outgoingFks.length,
    ) : '';

    const detailsHtml = `
      ${columnsHtml}
      ${tableRulesHtml}
      ${incomingHtml}
      ${m2mHtml}
      ${outgoingHtml}
    `;

    const joinBadgeHtml = t.isJoinTable
      ? '<span class="table-badge join" title="Join table · two foreign keys, no content columns">join table</span>'
      : '';

    const pkHtml = t.primaryKey && t.primaryKey.length
      ? `<span class="pk">primary key · <b>${esc(pkText)}</b></span>`
      : '';

    const schemaName = t.schema || 'public';
    const modelBtn = t.modelPath
      ? `<button class="act" data-open-model="${esc(t.modelPath)}" title="Open ${esc(t.modelName || t.name)}">open model</button>`
      : '';

    const markup = `
      <div class="table-view">
        <header>
          <h1><span class="schema">${esc(schemaName)}.</span><span class="name">${esc(t.name)}</span></h1>
          ${joinBadgeHtml}
          ${pkHtml}
          <div class="right">
            <div class="compare-wrap">
              <button class="act" data-cmp-open>compare ⟷</button>
              <div class="compare-popover" id="comparePopover">
                <input type="search" placeholder="search tables…" data-cmp-search autocomplete="off" spellcheck="false" />
                <ul data-cmp-list></ul>
              </div>
            </div>
            ${modelBtn}
            <button class="act" data-copy="${esc(t.name)}">copy name</button>
          </div>
        </header>

        ${detailsHtml}
      </div>
    `;

    mount(main, markup);

    bindRowEventsIn(main);

    const cmpBtn = main.querySelector('[data-cmp-open]');
    if (cmpBtn) cmpBtn.addEventListener('click', e => { e.stopPropagation(); openComparePopover(); });
    const modelBtnEl = main.querySelector('[data-open-model]');
    if (modelBtnEl) {
      modelBtnEl.addEventListener('click', () => {
        __vscodeApi.postMessage({ type: 'openModel', path: modelBtnEl.dataset.openModel });
      });
    }
    const cmpSearch = main.querySelector('[data-cmp-search]');
    if (cmpSearch) {
      cmpSearch.addEventListener('input', () => renderComparePopoverList(cmpSearch.value));
      cmpSearch.addEventListener('click', e => e.stopPropagation());
    }

    if (state.highlightColumn) {
      const row = main.querySelector(`tr[data-col="${state.highlightColumn}"]`);
      if (row) row.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  function cardinalityTitle(card) {
    switch (card) {
      case 'n:1': return 'many-to-one — many rows here reference one target row';
      case '1:n': return 'one-to-many — one row here is referenced by many rows in the other table';
      case '1:1': return 'one-to-one — the FK column carries a unique constraint';
      case 'n:m': return 'many-to-many — via a join table';
      default:    return '';
    }
  }

  function cardBadge(card) {
    const c = card || 'n:1';
    const cls = 'card-' + c.replace(':', '');
    return `<span class="card-badge ${cls}" title="${cardinalityTitle(c)}">${c}</span>`;
  }

  function colTypeOf(tableName, colName) {
    const t = state.tables.get(tableName);
    if (!t) return '';
    const col = t.columns.find(c => c.name === colName);
    return col ? col.type : '';
  }

  function renderEntityCard(tableName, colName, kind, clickable) {
    // kind: 'pk' | 'fk' | 'none'
    const cls = kind === 'pk' ? 'has-pk' : (kind === 'fk' ? 'has-fk' : '');
    const ind = kind === 'pk' ? '★' : (kind === 'fk' ? '↗' : '·');
    const ctype = colTypeOf(tableName, colName);
    const dataAttr = clickable ? ` data-target="${esc(tableName)}" data-target-col="${esc(colName)}"` : '';
    const clickCls = clickable ? 'clickable' : '';
    return `<div class="er-entity ${cls} ${clickCls}"${dataAttr}>
      <div class="er-col">
        <span class="ind">${ind}</span>
        <span class="colname"><span class="tbl">${esc(tableName)}</span>.${esc(colName)}</span>
        ${ctype ? `<span class="ctype">${esc(ctype)}</span>` : ''}
      </div>
    </div>`;
  }

  let _rowSeq = 0;
  function nextRowId() { return `row-${++_rowSeq}`; }

  function relationshipLabel(dir, card) {
    if (dir === 'm2m') return 'has_and_belongs_to_many';
    if (dir === 'outgoing') return 'belongs_to';
    return card === '1:1' ? 'has_one' : 'has_many';
  }

  function constraintTypeClass(type) {
    return String(type || '').toLowerCase().replace(/[^a-z0-9]+/g, '') || 'other';
  }

  function renderConstraintsTable(constraints) {
    if (!constraints || !constraints.length) return '';
    const rows = constraints.map(c => {
      const cols = (c.columns && c.columns.length)
        ? c.columns.map(col => esc(col)).join(', ')
        : '—';
      const def = c.definition ? esc(c.definition) : '—';
      const typeCls = constraintTypeClass(c.type);
      return `<tr>
        <td class="c-name"><code>${esc(c.name)}</code></td>
        <td><span class="c-type ${typeCls}">${esc(c.type || '—')}</span></td>
        <td class="c-cols">${cols}</td>
        <td class="c-def">${def}</td>
      </tr>`;
    }).join('');
    return `<table class="cols constraints-tbl">
      <thead><tr>
        <th style="width:24%">name</th>
        <th style="width:14%">type</th>
        <th style="width:18%">columns</th>
        <th>definition</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function renderFkList(fks, dir, contextTable) {
    if (!fks.length) return `<div class="empty-fk">none</div>`;
    const current = contextTable || state.selected;
    const rows = fks.map(fk => {
      // Visual layout is ALWAYS [current(left)] → [other(right)] regardless of FK direction.
      // Column shown on each side depends on the FK direction:
      //   outgoing: left=current.fkCol, right=other.pkCol  (current "belongs_to" other)
      //   incoming: left=current.pkCol, right=other.fkCol  (current "has_many" of other)
      const isOut = dir === 'outgoing';
      const leftCol  = isOut ? fk.fromCol : fk.toCol;
      const rightCol = isOut ? fk.toCol   : fk.fromCol;
      const other   = isOut ? fk.toTable : fk.fromTable;
      const leftKind  = isOut ? 'fk' : 'pk';
      const rightKind = isOut ? 'pk' : 'fk';

      // Cardinality is stored from current's perspective already.
      const card = fk.cardinality || (isOut ? 'n:1' : '1:n');
      const rails = relationshipLabel(dir, card);

      const noteCls = fk.explicit ? '' : 'inferred';
      const noteTxt = fk.explicit
        ? (fk.onDelete ? 'on delete ' + fk.onDelete.toLowerCase() : '')
        : 'inferred relation';

      const rowId = nextRowId();
      // The same FK lives in the OTHER table's opposite list — flag it so the
      // expansion can hide the back-edge to avoid the X↔Y / Y↔X echo.
      const backDir = isOut ? 'incoming' : 'outgoing';

      return `<div class="row-wrap">
        <div class="fk-row" data-dir="${dir}" data-row-id="${rowId}">
          ${renderEntityCard(current, leftCol, leftKind, false)}
          <div class="er-conn">
            <div class="conn-rails-label">${esc(rails)}</div>
            <div class="conn-line-wrap"><div class="conn-line"></div><span class="conn-arrow">▶</span></div>
            ${cardBadge(card)}
            ${noteTxt ? `<div class="conn-meta ${noteCls}">${noteTxt}</div>` : ''}
          </div>
          ${renderEntityCard(other, rightCol, rightKind, true)}
          <div class="row-actions">
            <button class="expand-btn"
              data-expand-row="${rowId}"
              data-expand-table="${esc(other)}"
              data-back-dir="${backDir}"
              data-back-table="${esc(current)}"
              data-back-col="${esc(fk.fromCol)}"
              title="show relations of ${esc(other)}">
              show relations <span class="chev">▾</span>
            </button>
          </div>
        </div>
        <div class="row-expansion" data-expansion-for="${rowId}" style="display:none"></div>
      </div>`;
    }).join('');
    return `<div class="fk-list">${rows}</div>`;
  }

  function renderM2MRows(t, list) {
    const m2ms = list || t.manyToMany;
    if (!m2ms || !m2ms.length) return `<div class="empty-fk">none</div>`;
    const rows = m2ms.map(r => {
      const otherPk = (state.tables.get(r.otherTable)?.primaryKey?.[0]) || 'id';
      const selfPk  = (t.primaryKey?.[0]) || 'id';
      const rowId = nextRowId();
      return `<div class="row-wrap">
        <div class="fk-row m2m-row" data-row-id="${rowId}">
          ${renderEntityCard(t.name, selfPk, 'pk', false)}
          <div class="er-conn">
            <div class="conn-rails-label">${esc(relationshipLabel('m2m'))}</div>
            <div class="conn-line-wrap"><div class="conn-line"></div><span class="conn-arrow">◆</span></div>
            ${cardBadge('n:m')}
            <div class="conn-meta">via <button class="via-btn" data-target="${esc(r.via)}">${esc(r.via)}</button></div>
          </div>
          ${renderEntityCard(r.otherTable, otherPk, 'pk', true)}
          <div class="row-actions">
            <button class="expand-btn"
              data-expand-row="${rowId}"
              data-expand-table="${esc(r.otherTable)}"
              data-back-dir="m2m"
              data-back-table="${esc(t.name)}"
              data-back-via="${esc(r.via)}"
              title="show relations of ${esc(r.otherTable)}">
              show relations <span class="chev">▾</span>
            </button>
          </div>
        </div>
        <div class="row-expansion" data-expansion-for="${rowId}" style="display:none"></div>
      </div>`;
    }).join('');
    return `<div class="fk-list">${rows}</div>`;
  }

  function renderExpansion(tableName, exclude) {
    const t2 = state.tables.get(tableName);
    if (!t2) return `<div class="expansion-empty">unknown table: ${esc(tableName)}</div>`;

    // Drop the back-edge that would otherwise echo the parent row.
    let outFks = t2.outgoingFks;
    let incFks = t2.incomingFks;
    let m2ms   = t2.manyToMany || [];
    if (exclude) {
      if (exclude.dir === 'outgoing') {
        outFks = outFks.filter(fk => !(fk.toTable === exclude.table && fk.fromCol === exclude.col));
      } else if (exclude.dir === 'incoming') {
        incFks = incFks.filter(fk => !(fk.fromTable === exclude.table && fk.fromCol === exclude.col));
      } else if (exclude.dir === 'm2m') {
        m2ms = m2ms.filter(r => !(r.otherTable === exclude.table && r.via === exclude.via));
      }
    }

    const outCount = outFks.length;
    const incCount = incFks.length;
    const m2mCount = m2ms.length;
    const total = outCount + incCount + m2mCount;

    let html = `<div class="expansion-header">relations of <code>${esc(tableName)}</code></div>`;
    if (total === 0) {
      html += `<div class="expansion-empty">${esc(tableName)} has no other relations</div>`;
      return html;
    }
    if (incCount > 0) {
      html += `<div class="expansion-subhead"><b>${incCount}</b> has_many · used as FK in</div>`;
      html += renderFkList(incFks, 'incoming', tableName);
    }
    if (m2mCount > 0) {
      html += `<div class="expansion-subhead"><b>${m2mCount}</b> has_and_belongs_to_many</div>`;
      html += renderM2MRows(t2, m2ms);
    }
    if (outCount > 0) {
      html += `<div class="expansion-subhead"><b>${outCount}</b> belongs_to · outgoing</div>`;
      html += renderFkList(outFks, 'outgoing', tableName);
    }
    return html;
  }
