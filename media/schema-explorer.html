  function handleExpandRow(btn) {
    const rowId = btn.dataset.expandRow;
    const otherTable = btn.dataset.expandTable;
    const expansion = document.querySelector(`[data-expansion-for="${rowId}"]`);
    if (!expansion) return;
    const isHidden = expansion.style.display === 'none' || expansion.style.display === '';
    if (isHidden) {
      const backDir = btn.dataset.backDir;
      const exclude = backDir ? {
        dir: backDir,
        table: btn.dataset.backTable,
        col:   btn.dataset.backCol,
        via:   btn.dataset.backVia,
      } : null;
      const content = renderExpansion(otherTable, exclude);
      expansion.replaceChildren();
      expansion.insertAdjacentHTML('beforeend', content);
      expansion.style.display = 'block';
      btn.classList.add('expanded');
      btn.firstChild.textContent = 'hide relations ';
      bindRowEventsIn(expansion);
    } else {
      expansion.style.display = 'none';
      btn.classList.remove('expanded');
      btn.firstChild.textContent = 'show relations ';
    }
  }

  function bindRowEventsIn(container) {
    container.querySelectorAll('[data-target]').forEach(btn => {
      if (btn._bound) return;
      btn._bound = true;
      btn.addEventListener('click', e => {
        e.stopPropagation();
        selectTable(btn.dataset.target, btn.dataset.targetCol);
        const main = document.querySelector('#main');
        if (main) main.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
    container.querySelectorAll('[data-expand-row]').forEach(btn => {
      if (btn._bound) return;
      btn._bound = true;
      btn.addEventListener('click', e => {
        e.stopPropagation();
        handleExpandRow(btn);
      });
    });
    container.querySelectorAll('[data-copy]').forEach(btn => {
      if (btn._bound) return;
      btn._bound = true;
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(btn.dataset.copy).then(() => toast(`copied: ${btn.dataset.copy}`));
      });
    });
  }

  // ============ events ============
  function syncSidebarToggleUi() {
    const layout = $('#content-layout');
    const btn = $('#sidebar-toggle');
    const resizer = $('#sidebar-resizer');
    if (!layout || !btn) return;
    const collapsed = layout.classList.contains('sidebar-collapsed');
    btn.textContent = collapsed ? '▶' : '◀';
    btn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
    btn.setAttribute('aria-label', btn.title);
    if (resizer) {
      resizer.title = collapsed ? 'Click to expand sidebar' : 'Drag to resize · double-click to reset';
    }
  }

  function bindSidebarLayout() {
    const layout = $('#content-layout');
    const resizer = $('#sidebar-resizer');
    const toggle = $('#sidebar-toggle');
    if (!layout || !resizer || resizer._bound) return;
    resizer._bound = true;

    const savedWidth = parseInt(localStorage.getItem(LS_SIDEBAR_WIDTH) || '', 10);
    if (Number.isFinite(savedWidth) && savedWidth >= SIDEBAR_MIN) {
      layout.style.setProperty('--sidebar-width', `${savedWidth}px`);
    }
    if (localStorage.getItem(LS_SIDEBAR_COLLAPSED) === '1') {
      layout.classList.add('sidebar-collapsed');
    }
    syncSidebarToggleUi();

    let dragging = false;

    toggle?.addEventListener('click', e => {
      e.stopPropagation();
      layout.classList.toggle('sidebar-collapsed');
      localStorage.setItem(LS_SIDEBAR_COLLAPSED, layout.classList.contains('sidebar-collapsed') ? '1' : '0');
      syncSidebarToggleUi();
    });

    resizer.addEventListener('pointerdown', e => {
      if (e.target.closest('.sidebar-toggle')) return;
      if (layout.classList.contains('sidebar-collapsed')) {
        layout.classList.remove('sidebar-collapsed');
        localStorage.setItem(LS_SIDEBAR_COLLAPSED, '0');
        syncSidebarToggleUi();
        return;
      }
      dragging = true;
      resizer.classList.add('dragging');
      resizer.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    resizer.addEventListener('pointermove', e => {
      if (!dragging) return;
      const rect = layout.getBoundingClientRect();
      const max = rect.width * SIDEBAR_MAX_RATIO;
      let width = e.clientX - rect.left;
      width = Math.max(SIDEBAR_MIN, Math.min(max, width));
      layout.style.setProperty('--sidebar-width', `${Math.round(width)}px`);
    });

    const finishDrag = e => {
      if (!dragging) return;
      dragging = false;
      resizer.classList.remove('dragging');
      try { resizer.releasePointerCapture(e.pointerId); } catch {}
      const width = parseInt(getComputedStyle(layout).getPropertyValue('--sidebar-width'), 10);
      if (Number.isFinite(width)) localStorage.setItem(LS_SIDEBAR_WIDTH, String(width));
    };
    resizer.addEventListener('pointerup', finishDrag);
    resizer.addEventListener('pointercancel', finishDrag);

    resizer.addEventListener('dblclick', e => {
      if (e.target.closest('.sidebar-toggle')) return;
      layout.classList.remove('sidebar-collapsed');
      layout.style.setProperty('--sidebar-width', `${DEFAULT_SIDEBAR_WIDTH}px`);
      localStorage.setItem(LS_SIDEBAR_WIDTH, String(DEFAULT_SIDEBAR_WIDTH));
      localStorage.setItem(LS_SIDEBAR_COLLAPSED, '0');
      syncSidebarToggleUi();
    });
  }

  function bindSectionCollapse() {
    const main = $('#main');
    if (!main || main._sectionsBound) return;
    main._sectionsBound = true;

    main.addEventListener('click', e => {
      if (e.target.closest('a, button, input, textarea, select, .fk-col-link, [data-target], [data-open-model]')) return;
      const head = e.target.closest('.sechead.collapsible');
      if (!head || !main.contains(head)) return;
      const block = head.closest('section.block[data-section]');
      if (!block) return;
      toggleSectionBlock(block, block.classList.contains('collapsed'));
    });

    main.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const head = e.target.closest('.sechead.collapsible');
      if (!head || !main.contains(head)) return;
      e.preventDefault();
      const block = head.closest('section.block[data-section]');
      if (!block) return;
      toggleSectionBlock(block, block.classList.contains('collapsed'));
    });
  }

  function bindEvents() {
    const search = $('#search');
    search.addEventListener('input', renderTableList);

    const sourceLabel = $('#source-label');
    if (sourceLabel && !sourceLabel._bound) {
      sourceLabel._bound = true;
      sourceLabel.addEventListener('click', () => {
        const path = sourceLabel.dataset.copy;
        if (!path) return;
        navigator.clipboard.writeText(path).then(() => toast('copied schema path'));
      });
    }

    const projectSearch = $('#project-search');

    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement !== search && document.activeElement !== projectSearch) {
        e.preventDefault(); search.focus(); search.select();
      } else if (e.key === 'Escape') {
        if (document.activeElement === search) {
          if (search.value) { search.value = ''; renderTableList(); }
          else search.blur();
        }
      } else if (document.activeElement === projectSearch) {
        // arrow keys handled in bindProjectSelect
      } else if (document.activeElement === search) {
        if (e.key === 'Enter') {
          if (state.filtered.length) {
            const first = state.filtered[0];
            const colHit = first.matches[0];
            selectTable(first.table.name, colHit?.name);
            search.blur();
          }
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          const first = $('#tablelist li[data-table]');
          if (first) first.click();
        }
      } else {
        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
          const items = $$('#tablelist li[data-table]');
          if (!items.length) return;
          let idx = items.findIndex(li => li.dataset.table === state.selected);
          if (e.key === 'ArrowDown') idx = Math.min(items.length - 1, idx + 1);
          else idx = Math.max(0, idx - 1);
          if (items[idx]) {
            items[idx].click();
            items[idx].scrollIntoView({ block: 'nearest' });
            e.preventDefault();
          }
        }
      }
    });

    window.addEventListener('popstate', () => {
      const t = (location.hash || '').replace(/^#/, '');
      if (t && state.tables.has(t)) {
        state.selected = t;
        pushHistory(t);
        renderTableList();
        renderBreadcrumb();
        renderMain();
      }
    });

    document.addEventListener('click', e => {
      const pop = document.querySelector('#comparePopover');
      if (!pop || !pop.classList.contains('show')) return;
      if (!pop.contains(e.target) && !e.target.closest('[data-cmp-open]')) {
        pop.classList.remove('show');
      }
    });
  }

  function hydrateTable(raw) {
    return {
      ...raw,
      uniqueColumns: new Set(raw.uniqueColumns || []),
      indexedColumns: new Set(raw.indexedColumns || []),
      uniqueColumnSets: raw.uniqueColumnSets || [],
      isJoinTable: !!raw.isJoinTable,
      columnEnums: raw.columnEnums || {},
      modelPath: raw.modelPath || '',
      modelName: raw.modelName || '',
      columns: (raw.columns || []).map(c => ({
        ...c,
        default: c.default ?? null,
        enumType: c.enumType ?? null,
      })),
    };
  }

  let _stalePayload = null;

  function showStaleBanner(stale) {
    const el = $('#stale-banner');
    if (!el) return;
    _stalePayload = stale?.message ? stale : null;
    const textEl = el.querySelector('.stale-text');
    if (_stalePayload) {
      if (textEl) textEl.textContent = _stalePayload.message;
      el.hidden = false;
    } else {
      el.hidden = true;
      if (textEl) textEl.textContent = '';
    }
  }

  function bindStaleBannerActions() {
    const el = $('#stale-banner');
    if (!el || el.dataset.bound) return;
    el.dataset.bound = '1';
    el.querySelector('[data-stale-copy]')?.addEventListener('click', () => {
      if (!_stalePayload?.dumpCommand) return;
      __vscodeApi.postMessage({ type: 'copyStaleCommand', command: _stalePayload.dumpCommand });
      toast('copied dump command');
    });
    el.querySelector('[data-stale-open]')?.addEventListener('click', () => {
      if (!_stalePayload?.schemaPath) return;
      __vscodeApi.postMessage({ type: 'openSchemaFile', path: _stalePayload.schemaPath });
    });
    el.querySelector('[data-stale-run]')?.addEventListener('click', () => {
      if (!_stalePayload?.dumpCommand) return;
      __vscodeApi.postMessage({ type: 'runStaleCommand', command: _stalePayload.dumpCommand });
    });
    el.querySelector('[data-stale-refresh]')?.addEventListener('click', () => {
      __vscodeApi.postMessage({ type: 'refreshSchema' });
    });
  }

  function resetNavigationState() {
    state.history = [];
    state.selected = null;
    state.selectionKind = 'table';
    state.compareWith = null;
    state.highlightColumn = null;
    try { history.replaceState({}, '', window.location.pathname + window.location.search); } catch {}
  }

  function updateSourceLabel(label, kind, projectLabel, multiProject, sourcePath) {
    const small = $('#source-label');
    if (!small) return;
    if (sourcePath) {
      small.title = `${sourcePath}\nclick to copy`;
      small.classList.add('copy-path');
      small.dataset.copy = sourcePath;
    } else {
      small.removeAttribute('title');
      small.classList.remove('copy-path');
      delete small.dataset.copy;
    }
    if (multiProject) {
      small.hidden = !label;
      small.textContent = label || '';
      return;
    }
    small.hidden = false;
    if (projectLabel && label) {
      small.textContent = `${projectLabel} · ${label}`;
    } else if (label) {
      small.textContent = label;
    } else if (projectLabel) {
      small.textContent = projectLabel;
    } else if (kind) {
      small.textContent = kind;
    }
  }

  function currentProjectLabel(projects, activeProjectId, followEditor) {
    if (followEditor) return '↻ follow active editor';
    const active = projects.find(p => p.id === activeProjectId);
    return active ? (active.label || active.name) : 'select project…';
  }

  function buildProjectListItems(filter) {
    const q = (filter || '').trim().toLowerCase();
    const items = [];

    if (!q || 'follow active editor'.includes(q) || 'follow'.includes(q)) {
      items.push({ id: '', label: '↻ follow active editor', kind: 'auto-switch with editor', active: _projectFollowEditor });
    }

    for (const project of _projectCatalog) {
      const label = project.label || project.name;
      if (q && !label.toLowerCase().includes(q) && !project.name.toLowerCase().includes(q)) continue;
      items.push({
        id: project.id,
        label,
        kind: project.schemaKind || 'schema',
        active: !_projectFollowEditor && project.id === state.activeProjectId,
      });
    }

    return items;
  }

  function syncProjectHighlight() {
    const list = $('#project-list');
    if (!list) return;
    const els = list.querySelectorAll('.project-list-item');
    els.forEach((el, i) => {
      el.classList.toggle('highlighted', i === _projectHighlightIndex);
      if (i === _projectHighlightIndex) el.scrollIntoView({ block: 'nearest' });
    });
  }

  function moveProjectHighlight(delta) {
    if (!_projectListItems.length) return;
    let next = _projectHighlightIndex + delta;
    if (next < 0) next = _projectListItems.length - 1;
    if (next >= _projectListItems.length) next = 0;
    _projectHighlightIndex = next;
    syncProjectHighlight();
  }

  function renderProjectList(filter) {
    const list = $('#project-list');
    if (!list) return;
    _projectListItems = buildProjectListItems(filter);

    if (!_projectListItems.length) {
      _projectHighlightIndex = -1;
      mount(list, '<div class="project-list-empty">no matching projects</div>');
      return;
    }

    if (_projectHighlightIndex < 0 || _projectHighlightIndex >= _projectListItems.length) {
      const activeIdx = _projectListItems.findIndex(item => item.active);
      _projectHighlightIndex = activeIdx >= 0 ? activeIdx : 0;
    }

    mount(list, _projectListItems.map((item, i) => `
      <div class="project-list-item ${item.active ? 'active' : ''} ${i === _projectHighlightIndex ? 'highlighted' : ''}" data-project-id="${esc(item.id)}">
        ${esc(item.label)}
        ${item.kind ? `<span class="project-kind">${esc(item.kind)}</span>` : ''}
      </div>
    `).join(''));

    list.querySelectorAll('.project-list-item').forEach(el => {
      el.addEventListener('mousedown', e => {
        e.preventDefault();
        pickProject(el.dataset.projectId || null);
      });
    });
  }

  function openProjectPicker(options = {}) {
    const list = $('#project-list');
    if (!list) return;
    _projectPickerOpen = true;
    list.classList.add('show');
    const filter = options.showAll ? '' : ($('#project-search')?.value || '');
    _projectListItems = buildProjectListItems(filter);
    const activeIdx = _projectListItems.findIndex(item => item.active);
    _projectHighlightIndex = activeIdx >= 0 ? activeIdx : 0;
    renderProjectList(filter);
  }

  function closeProjectPicker() {
    const list = $('#project-list');
    const input = $('#project-search');
    if (list) list.classList.remove('show');
    _projectPickerOpen = false;
    if (input && !_projectSelectBusy) {
      input.value = currentProjectLabel(_projectCatalog, state.activeProjectId, _projectFollowEditor);
    }
  }

  function pickProject(projectId) {
    closeProjectPicker();
    if (_projectSelectBusy) return;
    __vscodeApi.postMessage({
      type: 'selectProject',
      projectId: projectId || null,
    });
  }

  function renderProjectSelect(projects, activeProjectId, followEditor) {
    const wrap = $('#project-picker-wrap');
    const group = $('#bar-search-group');
    const input = $('#project-search');
    if (!wrap || !input) return;

    if (!Array.isArray(projects) || projects.length <= 1) {
      wrap.classList.remove('show');
      group?.classList.remove('multi-project');
      _projectCatalog = [];
      closeProjectPicker();
      return;
    }

    wrap.classList.add('show');
    group?.classList.add('multi-project');
    _projectCatalog = projects;
    _projectFollowEditor = !!followEditor;
    _projectSelectBusy = true;
    input.value = currentProjectLabel(projects, activeProjectId, followEditor);
    _projectSelectBusy = false;
    if (_projectPickerOpen) renderProjectList(input.value);
  }

  function bindProjectSelect() {
    const input = $('#project-search');
    const picker = $('#project-picker');
    if (!input || !picker) return;

    input.addEventListener('focus', () => {
      openProjectPicker({ showAll: true });
      input.select();
    });
    input.addEventListener('click', () => openProjectPicker({ showAll: true }));
    input.addEventListener('input', () => {
      if (!_projectPickerOpen) openProjectPicker();
      _projectHighlightIndex = 0;
      renderProjectList(input.value);
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        e.preventDefault();
        e.stopPropagation();
        closeProjectPicker();
        input.blur();
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        e.stopPropagation();
        if (!_projectPickerOpen) openProjectPicker({ showAll: true });
        else moveProjectHighlight(1);
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        e.stopPropagation();
        if (!_projectPickerOpen) openProjectPicker({ showAll: true });
        else moveProjectHighlight(-1);
        return;
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        e.stopPropagation();
        const item = _projectListItems[_projectHighlightIndex];
        if (item) pickProject(item.id || null);
      }
    });

    document.addEventListener('click', e => {
      if (!picker.contains(e.target)) closeProjectPicker();
    });
  }

  function finishSchemaLoad(meta) {
    const multiProject = !!meta.multiProject;
    state.sourcePath = meta.sourcePath || '';
    renderStats();
    renderTableList();
    showStaleBanner(meta.stale);
    updateSourceLabel(meta.sourceLabel, meta.sourceKind, meta.projectLabel, multiProject, state.sourcePath);
    renderBreadcrumb();
    const targetTable = meta.table || (!meta.projectChanged && (location.hash || '').replace(/^#/, ''));
    if (targetTable && state.tables.has(targetTable)) {
      selectTable(targetTable, meta.column || null, { skipHistorySeed: !!meta.projectChanged });
      return;
    }
    if (meta.projectChanged) {
      const main = $('#main');
      if (main) {
        mount(main, `<div class="empty"><div class="empty-inner"><h2>project switched</h2><p>${state.order.length} tables · pick one from the sidebar</p></div></div>`);
      }
      return;
    }
    if (!state.selected && state.order.length) {
      const empty = document.querySelector('#main .empty');
      if (empty) empty.remove();
    }
  }

  function loadParsedSchema(payload, meta = {}) {
    const nextProjectId = meta.activeProjectId || null;
    const projectChanged = nextProjectId && nextProjectId !== state.activeProjectId;
    if (projectChanged) {
      state.activeProjectId = nextProjectId;
      resetNavigationState();
    } else if (nextProjectId) {
      state.activeProjectId = nextProjectId;
    }

    if (!payload) {
      state.tables = new Map();
      state.order = [];
      state.types = new Map();
      state.typeOrder = [];
      state.views = new Map();
      state.viewOrder = [];
      state.sourcePath = '';
      finishSchemaLoad({ ...meta, projectChanged, multiProject: meta.multiProject });
      return;
    }
    const tables = new Map();
    for (const name of payload.order) {
      tables.set(name, hydrateTable(payload.tables[name]));
    }
    state.tables = tables;
    state.order = payload.order;
    state.types = new Map();
    for (const name of payload.typeOrder || []) {
      if (payload.types?.[name]) state.types.set(name, payload.types[name]);
    }
    state.typeOrder = payload.typeOrder || [];
    state.views = new Map();
    for (const name of payload.viewOrder || []) {
      if (payload.views?.[name]) state.views.set(name, payload.views[name]);
    }
    state.viewOrder = payload.viewOrder || [];
    finishSchemaLoad({
      ...meta,
      projectChanged,
      stale: payload.stale,
      sourceKind: payload.sourceKind,
      sourcePath: payload.sourcePath,
      multiProject: meta.multiProject,
    });
  }

  let toastTimer = null;
  function toast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function applyTheme(theme) {
    const mode = theme === 'light' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', mode);
    document.documentElement.style.colorScheme = mode;
  }

  // ============ VS Code extension bridge ============
  const __vscodeApi = acquireVsCodeApi();
  window.addEventListener('message', event => {
    const msg = event.data;
    if (!msg || typeof msg !== 'object') return;
    if (msg.type === 'setTheme' && msg.theme) {
      applyTheme(msg.theme);
    } else if (msg.type === 'loadSchema') {
      if (msg.theme) applyTheme(msg.theme);
      renderProjectSelect(msg.projects, msg.activeProjectId, msg.followEditor);
      loadParsedSchema(msg.payload, {
        sourceLabel: msg.sourceLabel,
        projectLabel: msg.projectLabel,
        activeProjectId: msg.activeProjectId,
        multiProject: Array.isArray(msg.projects) && msg.projects.length > 1,
        table: msg.table,
        column: msg.column,
      });
      const count = msg.payload?.order?.length ?? 0;
      const project = msg.projectLabel ? `${msg.projectLabel} · ` : '';
      toast(count ? `loaded ${project}${count} tables` : 'no schema file found in workspace');
    }
  });

  function init() {
    bindSidebarLayout();
    bindSectionCollapse();
    bindEvents();
    bindProjectSelect();
    bindStaleBannerActions();
    __vscodeApi.postMessage({ type: 'ready' });
  }

  init();
})();
</script>
</body>
</html>
